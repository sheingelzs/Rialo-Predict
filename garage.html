<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo - My Garage</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style khusus untuk tampilan Garage yang rapi */
        .garage-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
        }
        .garage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .item-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.3s ease;
        }
        .item-card:hover {
            transform: translateY(-5px);
            border-color: #ffcc00;
        }
        .item-image {
            width: 100%;
            height: 120px;
            background: #333;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .item-info h3 {
            margin: 10px 0 5px 0;
            color: #ffcc00;
            font-size: 18px;
        }
        .item-info p {
            font-size: 14px;
            color: #aaa;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            background: #444;
            padding: 8px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="garage-container">
        <header>
            <a href="menu.html" class="back-btn">← Back to Menu</a>
            <h1>MY GARAGE</h1>
            <p>Koleksi aset Rialo Alpha Core milikmu</p>
        </header>

        <div class="garage-grid">
            <div class="item-card">
                <div class="item-image">🏎️</div>
                <div class="item-info">
                    <h3>Alpha Racer X</h3>
                    <p>Status: Ready</p>
                </div>
            </div>

            <div class="item-card">
                <div class="item-image">🏍️</div>
                <div class="item-info">
                    <h3>Cyber Bike</h3>
                    <p>Status: In Garage</p>
                </div>
            </div>

            <div class="item-card">
                <div class="item-image">🛸</div>
                <div class="item-info">
                    <h3>Sky Drifter</h3>
                    <p>Status: Repairs</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
