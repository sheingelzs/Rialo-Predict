<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO · Validator Garage</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050810;--card:#0f1929;--border:#1a2a42;
  --accent:#4ade80;--text:#e8eaf0;--muted:#5a7090;
  --font:'Space Grotesk',sans-serif;--font-head:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(5,8,16,.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:var(--font-head);font-size:1.2rem;font-weight:800;color:#fff;}
.nav-btn{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--accent);background:rgba(74,222,128,.1);color:var(--accent);cursor:pointer;font-weight:600;}

.container{max-width:500px;margin:2rem auto;padding:0 1.5rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
.label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;display:block;}
.val-big{font-size:1.8rem;font-family:var(--font-head);font-weight:800;margin-bottom:0.5rem;}

.input-group{margin-top:1.5rem;}
.input-field{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);padding:.8rem;border-radius:10px;color:#fff;font-family:monospace;margin-bottom:1rem;outline:none;}
.btn-send{width:100%;padding:1rem;background:var(--accent);color:#000;border:none;border-radius:10px;font-weight:800;cursor:pointer;transition:0.2s;}
.btn-send:hover{opacity:0.9;}

.status-tag{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;color:var(--accent);background:rgba(74,222,128,.1);padding:4px 10px;border-radius:20px;margin-bottom:1rem;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);padding:.8rem 1.2rem;border-radius:10px;font-size:.8rem;z-index:1000;animation:fadeup 0.3s ease;}
@keyframes fadeup{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">RIALO CORE</div>
  <button class="nav-btn" id="connect-btn" onclick="connect()">Connect Wallet</button>
</nav>

<div class="container" id="main-content" style="display:none;">
    <div class="status-tag">● VALIDATOR ACTIVE</div>
    
    <div class="card">
        <span class="label">Balance Context</span>
        <div class="val-big">$0.63 <span style="font-size:1rem; color:var(--muted)">ETH</span></div>
        <p style="font-size:.7rem; color:var(--muted)">Simulator Mode: Low-Cost Enabled</p>
    </div>

    <div class="card">
        <span class="label">Stake Transaction</span>
        <div class="input-group">
            <input type="number" id="tx-amount" class="input-field" value="0.000001" step="0.000001">
            <button class="btn-send" onclick="sendTinyTx()">Stake Now →</button>
        </div>
        <div style="margin-top:1rem; display:flex; justify-content:space-between; font-size:.65rem; color:var(--muted)">
            <span>Est. Cost: ~$0.003</span>
            <span>Est. Clicks: ~200x</span>
        </div>
    </div>
</div>

<div class="container" id="login-prompt">
    <div class="card" style="text-align:center; padding:3rem 1.5rem;">
        <h2 style="margin-bottom:1rem">Akses Validator</h2>
        <p style="color:var(--muted); font-size:.9rem; margin-bottom:2rem;">Silakan koneksikan dompet untuk masuk ke Garage.</p>
        <button class="btn-send" onclick="connect()">Connect OKX Wallet</button>
    </div>
</div>

<div id="toast-box"></div>

<script>
let userAddress = null;

async function connect() {
    if(!window.ethereum) return alert("Gunakan OKX Wallet!");
    try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        document.getElementById('connect-btn').innerText = userAddress.slice(0,6)+'...';
        document.getElementById('login-prompt').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        showToast("Wallet Connected!");
    } catch (e) { console.error(e); }
}

async function sendTinyTx() {
    const amountInput = document.getElementById('tx-amount').value;
    // Konversi ke Hex
    const hexValue = "0x" + BigInt(Math.floor(parseFloat(amountInput) * 1e18)).toString(16);
    
    showToast("Membuka OKX Wallet...");

    try {
        const tx = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{
                from: userAddress,
                to: '0x00000000219ab540356cBB839Cbe05303d7705Fa', // Contract Stake
                value: hexValue,
                gas: '0x5208', // Paksa Gas Limit ke 21.000 (Paling murah)
            }]
        });
        showToast("Sukses! Sisa saldo masih aman.");
    } catch (e) {
        showToast("Gagal atau Dibatalkan");
        console.error(e);
    }
}

function showToast(msg) {
    const box = document.getElementById('toast-box');
    box.innerHTML = `<div class="toast">${msg}</div>`;
    setTimeout(() => { box.innerHTML = ''; }, 3000);
}
</script>
</body>
</html>
