<style>

.li-ico {
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.li-ico img {

}

/* Transisi halus untuk angka telemetry */

  transition: color 0.3s ease;
}

/* ... (sisa style lainnya tetap sama) ... */
</style>

<script>
/* ... (Canvas, State, Connect Wallet tetap sama di atas) ... */

/* ── DATABASE ASET ASLI MARKET (PNG) & DATA TEKNIS (REVISI) ── */
const REAL_MARKET_DATA = {
  EVM: {
    finality: 50,
    fStatus: 'OPTIMAL',
    integrity: '3 / 3',
    iStatus: 'VERIFIED',
    baseGas: 0.00125,
    color: '#4ade80', 
    gaugeOffset: 40,
    stack: [
      { name: "Ethereum", logo: "https://cryptologos.cc/logos/ethereum-eth-logo.png?v=032", status: "SETTLEMENT" },
      { name: "Arbitrum", logo: "https://cryptologos.cc/logos/arbitrum-arb-logo.png?v=032", status: "L2 EXECUTION" },
      { name: "Optimism", logo: "https://cryptologos.cc/logos/optimism-ethereum-op-logo.png?v=032", status: "SCALING" }
    ],
    desc: 'Active: <strong>EVM</strong> — Ethereum-compatible execution. Solidity contracts ready. Gas model: SUBSIDIZED.'
  },
  SVM: {
    finality: 22,
    fStatus: 'ULTRA FAST',
    integrity: '12 / 12',
    iStatus: 'STABLE',
    baseGas: 0.00005,
    color: '#22d3ee', 
    gaugeOffset: 15,
    stack: [
      { name: "Solana", logo: "https://cryptologos.cc/logos/solana-sol-logo.png?v=032", status: "SVM CORE" },
      { name: "Pyth Network", logo: "https://cryptologos.cc/logos/pyth-network-pyth-logo.png?v=032", status: "ORACLE" },
      { name: "Jupiter", logo: "https://static.jup.ag/jup/tokens/jup.png", status: "AGGREGATOR" }
    ],
    desc: 'Active: <strong>SVM</strong> — Solana Virtual Machine. Parallel transaction processing active. Rust-based.'
  },
  MOVE: {
    finality: 45,
    fStatus: 'SECURE',
    integrity: '5 / 5',
    iStatus: 'SYNCHRONIZED',
    baseGas: 0.00082,
    color: '#7c5cfc', 
    gaugeOffset: 55,
    stack: [
      { name: "Sui", logo: "https://cryptologos.cc/logos/sui-sui-logo.png?v=032", status: "OBJECT-VM" },
      { name: "Aptos", logo: "https://cryptologos.cc/logos/aptos-apt-logo.png?v=032", status: "MOVE-CORE" },
      { name: "Movement", logo: "https://raw.githubusercontent.com/Rialo-Labs/branding/main/movement_logo_white.png", status: "M2 STACK" }
    ],
    desc: 'Active: <strong>MOVE</strong> — Move language VM. Resource-oriented, safe asset management active.'
  }
};

let currentVM = 'EVM';

/* ── LOGIKA SIMULASI GAS REAL-TIME ── */
setInterval(() => {
  const data = REAL_MARKET_DATA[currentVM];
  const jitter = (Math.random() * 0.00008).toFixed(5);
  const liveBase = (data.baseGas + parseFloat(jitter)).toFixed(5);
  const liveCost = (liveBase * 0.0001).toFixed(6);

  // Update elemen gas di dalam Mod Card
  const gasCells = document.querySelectorAll('.gr-val');
  if(gasCells.length >= 3) {
    gasCells[0].textContent = `${liveBase} GWEI`; // Base Fee
    gasCells[2].textContent = `$${liveCost}`;    // Tx Cost
  }
}, 2000);

/* ── VM SWITCHER (REVISI TOTAL) ── */
function switchVM(vm, btn) {
  currentVM = vm;
  const data = REAL_MARKET_DATA[vm];
  if(!data) return;

  // 1. Update UI Tab
  document.querySelectorAll('.vm-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  // 2. Update Telemetry Cards
  const fVal = document.querySelector('.tele-card.g .tele-val');
  const fTag = document.querySelector('.tele-card.g .tag');
  const iVal = document.querySelector('.tele-card.p .tele-val');
  const iTag = document.querySelector('.tele-card.p .tag');

  if(fVal) { fVal.innerHTML = `${data.finality}<span style="font-size:1rem">ms</span>`; fVal.style.color = data.color; }
  if(fTag) fTag.innerHTML = `● ${data.fStatus}`;
  if(iVal) { iVal.textContent = data.integrity; iVal.style.color = data.color; }
  if(iTag) iTag.innerHTML = `● ${data.iStatus}`;

  // 3. Update Gauge
  const gVal = document.querySelector('.fin-card svg text[font-size="26"]');
  const gPath = document.querySelector('.fin-card svg path[stroke-dasharray="188"]');
  if(gVal) { gVal.textContent = data.finality; gVal.setAttribute('fill', data.color); }
  if(gPath) gPath.style.strokeDashoffset = data.gaugeOffset;

  // 4. Update Stack Integrity List (Logo PNG)
  const stackContainer = document.querySelector('.mod-grid .mod-card:last-child');
  if(stackContainer) {
    let html = `<div class="card-lbl">🧱 ${vm} Supermodular Layer Stack</div>`;
    data.stack.forEach((item, idx) => {
      html += `
        <div class="layer-item" style="animation: fadein 0.3s ease forwards; animation-delay: ${idx*0.1}s">
          <div class="li-n">0${idx+1}</div>
          <div class="li-ico">
            <img src="${item.logo}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/20?text=?'">
          </div>
          <div class="li-info">
            <div class="li-name">${item.name}</div>
          </div>
          <span class="li-pill" style="background: ${data.color}20; color: ${data.color}">${item.status}</span>
        </div>`;
    });
    stackContainer.innerHTML = html;
  }

  // 5. Update Label & Deskripsi
  const labelEl = document.getElementById('vm-label');
  const descEl = document.getElementById('vm-desc');
  if(labelEl) { labelEl.textContent = vm; labelEl.style.color = data.color; }
  if(descEl) descEl.innerHTML = data.desc;
}

/* ... (Init & Sisanya tetap sama) ... */
renderPicker();
</script>
