<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo - Swap Engine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan style khusus halaman swap agar rapi */
        .swap-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
        }
        .swap-input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .swap-input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }
        .swap-input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
        }
        .btn-swap {
            width: 100%;
            padding: 15px;
            background: #ffcc00;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="swap-container">
        <header>
            <h2>RIALO SWAP</h2>
            <p>Tukar aset digital kamu di sini</p>
        </header>

        <div class="swap-section">
            <div class="swap-input-group">
                <label>Dari:</label>
                <input type="number" id="from-amount" placeholder="0.0">
            </div>

            <div class="swap-divider">
                <span>⬇️</span>
            </div>

            <div class="swap-input-group">
                <label>Ke (Estimasi):</label>
                <input type="number" id="to-amount" placeholder="0.0" disabled>
            </div>

            <button class="btn-swap" onclick="handleSwap()">KONFIRMASI SWAP</button>
        </div>

        <a href="menu.html" class="back-link">← Kembali ke Dashboard</a>
    </div>

    <script src="script.js"></script>
    <script>
        // Fungsi placeholder untuk memastikan tombol bekerja
        function handleSwap() {
            const amount = document.getElementById('from-amount').value;
            if (amount > 0) {
                alert('Memproses swap untuk ' + amount + ' unit...');
            } else {
                alert('Masukkan jumlah yang valid!');
            }
        }
    </script>
</body>
</html>
