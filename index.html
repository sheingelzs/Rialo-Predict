<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Predict | Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <nav class="navbar">
            <div class="logo-wrapper">
                <img src="logo-rialo.png" alt="Rialo" class="rotating-logo">
            </div>
            <span class="brand-name">RIALO PREDICT</span>
        </nav>

        <header class="hero">
            <h2>Pasar Prediksi Terakurat</h2>
            <p>Pilih hasil pertandingan dan lihat peluang kemenanganmu.</p>
        </header>

        <section class="market-list">
            
            <div class="card">
                <div class="card-header">
                    <span class="category">Sepak Bola</span>
                    <span class="status">Live</span>
                </div>
                <h3>Apakah Team A akan menang melawan Team B?</h3>
                <div class="odds-container">
                    <button class="btn-vote yes">
                        <span>Ya</span>
                        <span class="percent">65%</span>
                    </button>
                    <button class="btn-vote no">
                        <span>Tidak</span>
                        <span class="percent">35%</span>
                    </button>
                </div>
                <div class="card-footer">
                    <span>Volume: $12,402</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="category">E-Sports</span>
                    <span class="status-closed">Berakhir</span>
                </div>
                <h3>Turnamen Major: Team Rialo Juara 1?</h3>
                <div class="odds-container">
                    <button class="btn-vote yes disabled">
                        <span>Ya</span>
                        <span class="percent">80%</span>
                    </button>
                    <button class="btn-vote no disabled">
                        <span>Tidak</span>
                        <span class="percent">20%</span>
                    </button>
                </div>
            </div>

        </section>

        <footer>
            <p>&copy; 2024 Rialo Predict Market</p>
        </footer>
    </div>

</body>
</html>
