<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS — Enter The Void</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#7c3aed;
  --cyan:#06b6d4;
  --pink:#ec4899;
  --dark:#050010;
  --dark2:#0d0020;
  --dark3:#110028;
  --text:#e2e8f0;
  --muted:#94a3b8;
}
html{scroll-behavior:smooth;overflow-y:scroll;}
body{
  background:var(--dark);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
  cursor:none;
}
*{cursor:none;}

/* CURSOR */
#cursor{
  position:fixed;width:12px;height:12px;
  background:var(--cyan);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.1s,background 0.2s;
  mix-blend-mode:screen;
}
#cursor-trail{
  position:fixed;width:40px;height:40px;
  border:1px solid var(--purple);border-radius:50%;
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:left 0.12s ease,top 0.12s ease;
  opacity:0.5;
}

/* NAVBAR */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 4rem;
  background:rgba(5,0,16,0.7);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(124,58,237,0.2);
}
.logo{
  font-family:'Orbitron',monospace;
  font-weight:900;font-size:1.4rem;
  color:var(--cyan);
  letter-spacing:4px;
  text-shadow:0 0 20px rgba(6,182,212,0.5);
}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{
  color:var(--muted);font-size:0.85rem;
  letter-spacing:2px;text-decoration:none;
  text-transform:uppercase;
  transition:color 0.3s;
  font-weight:600;
}
.nav-links a:hover{color:var(--cyan);}
.nav-btn{
  padding:0.5rem 1.5rem;
  border:1px solid var(--cyan);
  background:transparent;color:var(--cyan);
  font-family:'Rajdhani',sans-serif;
  font-size:0.85rem;letter-spacing:2px;
  text-transform:uppercase;font-weight:600;
  cursor:none;
  transition:all 0.3s;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.nav-btn:hover{background:var(--cyan);color:var(--dark);}

/* HERO */
#hero{
  min-height:100vh;
  display:flex;align-items:center;
  position:relative;
  padding:0 4rem;
  overflow:visible;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 60% at 70% 50%, rgba(124,58,237,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 30% 80%, rgba(236,72,153,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 30% 30% at 80% 20%, rgba(6,182,212,0.08) 0%, transparent 60%);
}
.grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
  background-size:60px 60px;
}
.scanline{
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px
  );
  pointer-events:none;
}

.hero-content{
  position:relative;z-index:2;
  max-width:600px;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:0.3rem 1rem;
  border:1px solid rgba(6,182,212,0.4);
  color:var(--cyan);font-size:0.75rem;
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:1.5rem;
  animation:fadeUp 0.8s ease both;
}
.hero-tag::before{
  content:'';width:6px;height:6px;
  background:var(--cyan);border-radius:50%;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}

.hero-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(2.5rem,6vw,5rem);
  font-weight:900;line-height:0.95;
  text-transform:uppercase;
  margin-bottom:1.5rem;
  animation:fadeUp 0.8s 0.1s ease both;
}
.title-line1{display:block;color:var(--text);}
.title-line2{
  display:block;
  color:transparent;
  -webkit-text-stroke:1px var(--purple);
}
.title-line3{
  display:block;
  background:linear-gradient(90deg,var(--cyan),var(--pink));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero-sub{
  color:var(--muted);font-size:1rem;
  line-height:1.8;letter-spacing:1px;
  margin-bottom:2.5rem;
  animation:fadeUp 0.8s 0.2s ease both;
}
.hero-btns{
  display:flex;gap:1rem;flex-wrap:wrap;
  animation:fadeUp 0.8s 0.3s ease both;
}
.btn-primary{
  padding:0.9rem 2.5rem;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border:none;
  font-family:'Rajdhani',sans-serif;
  font-size:0.9rem;letter-spacing:3px;
  text-transform:uppercase;font-weight:700;
  cursor:none;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
  transition:all 0.3s;
  position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  opacity:0;transition:opacity 0.3s;
}
.btn-primary:hover::after{opacity:1;}
.btn-primary span{position:relative;z-index:1;}
.btn-secondary{
  padding:0.9rem 2.5rem;
  background:transparent;
  border:1px solid rgba(124,58,237,0.5);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  font-size:0.9rem;letter-spacing:3px;
  text-transform:uppercase;font-weight:600;
  cursor:none;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
  transition:all 0.3s;
}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan);}

/* 3D SPINNING LOGO */
.logo-3d-wrap{
  position:absolute;right:6%;top:50%;
  transform:translateY(-50%);
  width:420px;height:420px;
  display:flex;align-items:center;justify-content:center;
  z-index:2;
  animation:fadeUp 1s 0.4s ease both;
}
.logo-rings{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.ring{
  position:absolute;border-radius:50%;border-style:solid;
}
.ring-1{
  width:380px;height:380px;
  border-width:1px;border-color:rgba(124,58,237,0.25);
  animation:spinCW 18s linear infinite;
}
.ring-2{
  width:310px;height:310px;
  border-width:1px;border-color:rgba(6,182,212,0.3);
  border-style:dashed;
  animation:spinCCW 12s linear infinite;
}
.ring-3{
  width:240px;height:240px;
  border-width:1px;border-color:rgba(236,72,153,0.2);
  animation:spinCW 8s linear infinite;
}
.ring-dot{
  position:absolute;width:8px;height:8px;
  border-radius:50%;top:-4px;left:50%;transform:translateX(-50%);
}
.ring-dot-cyan{background:var(--cyan);box-shadow:0 0 12px var(--cyan);}
.ring-dot-purple{background:var(--purple);box-shadow:0 0 12px var(--purple);}
.ring-dot-pink{background:var(--pink);box-shadow:0 0 10px var(--pink);}

.logo-scene{
  width:200px;height:200px;
  perspective:600px;
  position:relative;z-index:2;
}
.logo-cube{
  width:200px;height:200px;
  position:relative;
  transform-style:preserve-3d;
  animation:rotateCube 10s ease-in-out infinite;
}
.logo-face{
  position:absolute;width:200px;height:200px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(124,58,237,0.35);
  background:rgba(13,0,32,0.7);
  overflow:hidden;
}
.logo-face img{
  width:130px;height:130px;
  object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(6,182,212,0.7));
}
.logo-face-front {transform:translateZ(100px);}
.logo-face-back  {transform:rotateY(180deg) translateZ(100px);}
.logo-face-left  {transform:rotateY(-90deg) translateZ(100px);}
.logo-face-right {transform:rotateY(90deg)  translateZ(100px);}
.logo-face-top   {transform:rotateX(90deg)  translateZ(100px);}
.logo-face-bottom{transform:rotateX(-90deg) translateZ(100px);}

.logo-glow-base{
  position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);
  width:200px;height:30px;
  background:radial-gradient(ellipse,rgba(124,58,237,0.4) 0%,transparent 70%);
  border-radius:50%;
  animation:glowPulse 3s ease-in-out infinite;
}
.logo-scan{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;
}
.logo-scan::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(6,182,212,0.6),transparent);
  animation:scanMove 3s ease-in-out infinite;
}
@keyframes scanMove{
  0%{top:-2px;}100%{top:202px;}
}

@keyframes spinCW{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes spinCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes rotateCube{
  0%  {transform:rotateY(0deg)   rotateX(10deg);}
  25% {transform:rotateY(90deg)  rotateX(5deg);}
  50% {transform:rotateY(180deg) rotateX(10deg);}
  75% {transform:rotateY(270deg) rotateX(5deg);}
  100%{transform:rotateY(360deg) rotateX(10deg);}
}
@keyframes glowPulse{
  0%,100%{transform:translateX(-50%) scale(1);opacity:0.8;}
  50%{transform:translateX(-50%) scale(1.3);opacity:0.4;}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

/* STATS BAR */
.stats-bar{
  display:flex;gap:3rem;margin-top:3rem;
  padding-top:2rem;
  border-top:1px solid rgba(124,58,237,0.2);
  animation:fadeUp 0.8s 0.4s ease both;
}
.stat-item{}
.stat-num{
  font-family:'Orbitron',monospace;
  font-size:1.8rem;font-weight:900;
  color:var(--cyan);
}
.stat-label{
  font-size:0.7rem;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;
}

/* SECTION COMMON */
section{padding:6rem 4rem;}
.section-tag{
  font-family:'Orbitron',monospace;
  font-size:0.7rem;letter-spacing:4px;
  color:var(--cyan);text-transform:uppercase;
  margin-bottom:0.8rem;
}
.section-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(1.8rem,3vw,2.8rem);
  font-weight:900;text-transform:uppercase;
  line-height:1.1;margin-bottom:1rem;
}

/* CARDS SECTION */
#explore{background:var(--dark2);position:relative;overflow:hidden;}
#explore::before{
  content:'';position:absolute;top:-100px;left:-100px;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,0.1) 0%,transparent 70%);
}
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:1.5rem;margin-top:3rem;
}
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(124,58,237,0.2);
  padding:2rem;
  position:relative;overflow:hidden;
  transition:all 0.4s;
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.08) 0%,transparent 50%);
  opacity:0;transition:opacity 0.4s;
}
.card:hover{border-color:rgba(6,182,212,0.5);transform:translateY(-4px);}
.card:hover::before{opacity:1;}
.card-icon{
  width:50px;height:50px;
  border:1px solid rgba(6,182,212,0.3);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1.2rem;font-size:1.4rem;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  background:rgba(6,182,212,0.05);
}
.card-title{
  font-family:'Orbitron',monospace;
  font-size:0.95rem;font-weight:700;
  letter-spacing:2px;margin-bottom:0.8rem;
  color:var(--text);
}
.card-desc{color:var(--muted);font-size:0.9rem;line-height:1.7;}
.card-tag{
  display:inline-block;margin-top:1.2rem;
  padding:0.2rem 0.8rem;
  border:1px solid rgba(124,58,237,0.4);
  color:var(--purple);font-size:0.7rem;
  letter-spacing:2px;text-transform:uppercase;
}

/* FEATURE / SPLIT SECTION */
#feature{position:relative;overflow:hidden;}
.feature-inner{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6rem;align-items:center;
}
.feature-visual{
  position:relative;
}
.feature-box{
  background:rgba(124,58,237,0.06);
  border:1px solid rgba(124,58,237,0.25);
  padding:2.5rem;
  clip-path:polygon(0 0,calc(100% - 30px) 0,100% 30px,100% 100%,30px 100%,0 calc(100% - 30px));
  position:relative;
}
.feature-box-inner{
  width:100%;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
}
.hud-ring{
  width:220px;height:220px;border-radius:50%;
  border:1px solid rgba(6,182,212,0.3);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  animation:spin 20s linear infinite;
}
.hud-ring::before{
  content:'';position:absolute;
  width:180px;height:180px;border-radius:50%;
  border:1px dashed rgba(124,58,237,0.4);
}
.hud-ring::after{
  content:'';position:absolute;
  width:130px;height:130px;border-radius:50%;
  border:2px solid rgba(236,72,153,0.3);
}
.hud-core{
  width:80px;height:80px;border-radius:50%;
  background:radial-gradient(circle,rgba(6,182,212,0.3),rgba(124,58,237,0.2));
  border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;
  font-size:0.6rem;letter-spacing:2px;
  color:var(--cyan);
  z-index:1;
}
.hud-dot{
  position:absolute;width:8px;height:8px;
  border-radius:50%;background:var(--cyan);
  top:-4px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 10px var(--cyan);
}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.corner-tl,.corner-br{
  position:absolute;width:20px;height:20px;
}
.corner-tl{top:0;left:0;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.corner-br{bottom:0;right:0;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}

.feature-list{margin-top:2rem;}
.feature-item{
  display:flex;gap:1rem;padding:1rem 0;
  border-bottom:1px solid rgba(124,58,237,0.15);
}
.feature-item:last-child{border-bottom:none;}
.feature-dot{
  width:8px;height:8px;min-width:8px;
  background:var(--cyan);border-radius:50%;
  margin-top:6px;
  box-shadow:0 0 8px var(--cyan);
}
.feature-text h4{
  font-size:0.9rem;letter-spacing:1px;
  color:var(--text);margin-bottom:0.3rem;
}
.feature-text p{color:var(--muted);font-size:0.85rem;line-height:1.6;}

/* CHARACTERS SHOWCASE */
#characters{background:var(--dark3);position:relative;}
.char-showcase{
  display:flex;gap:1.5rem;margin-top:3rem;
  overflow-x:auto;padding-bottom:1rem;
}
.char-showcase::-webkit-scrollbar{height:2px;}
.char-showcase::-webkit-scrollbar-thumb{background:var(--purple);}
.char-card{
  min-width:200px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(124,58,237,0.2);
  padding:1.5rem 1rem;
  text-align:center;
  transition:all 0.4s;
  cursor:none;
  position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
}
.char-card:hover{border-color:var(--pink);transform:translateY(-6px);}
.char-card.active{border-color:var(--cyan);}
.char-avatar{
  width:100px;height:100px;border-radius:50%;
  margin:0 auto 1rem;overflow:hidden;
  border:2px solid rgba(124,58,237,0.3);
  background:rgba(124,58,237,0.1);
  display:flex;align-items:center;justify-content:center;
}
.char-name{
  font-family:'Orbitron',monospace;
  font-size:0.8rem;letter-spacing:2px;
  color:var(--text);margin-bottom:0.3rem;
}
.char-role{color:var(--muted);font-size:0.75rem;letter-spacing:1px;}
.char-power{
  margin-top:0.8rem;
  padding:0.2rem 0.6rem;
  background:rgba(236,72,153,0.1);
  border:1px solid rgba(236,72,153,0.3);
  color:var(--pink);font-size:0.65rem;
  letter-spacing:2px;text-transform:uppercase;
  display:inline-block;
}

/* CTA */
#cta{
  text-align:center;position:relative;overflow:hidden;
}
#cta::before{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(124,58,237,0.12) 0%,transparent 70%);
  border-radius:50%;
}
.cta-inner{position:relative;z-index:1;}
.cta-subtitle{
  color:var(--muted);font-size:1rem;
  letter-spacing:2px;margin-top:1rem;margin-bottom:2.5rem;
}
.cta-line{
  width:100px;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  margin:1.5rem auto;
}

/* FOOTER */
footer{
  background:var(--dark2);
  border-top:1px solid rgba(124,58,237,0.2);
  padding:2rem 4rem;
  display:flex;align-items:center;justify-content:space-between;
}
.footer-logo{
  font-family:'Orbitron',monospace;
  font-weight:900;color:var(--cyan);
  letter-spacing:4px;font-size:1rem;
}
.footer-copy{
  color:var(--muted);font-size:0.75rem;
  letter-spacing:2px;
}
.footer-links{display:flex;gap:1.5rem;}
.footer-links a{
  color:var(--muted);font-size:0.75rem;
  letter-spacing:1px;text-decoration:none;
  transition:color 0.3s;
}
.footer-links a:hover{color:var(--cyan);}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(40px);transition:all 0.8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* PARTICLES */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
  <div class="logo">NEXUS</div>
  <ul class="nav-links">
    <li><a href="#explore">Explore</a></li>
    <li><a href="#feature">Feature</a></li>
    <li><a href="#characters">Characters</a></li>
  </ul>
  <button class="nav-btn">Launch App</button>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="grid-bg"></div>
  <div class="scanline"></div>

  <div class="hero-content">
    <div class="hero-tag">System Online // v2.077</div>
    <h1 class="hero-title">
      <span class="title-line1">ENTER</span>
      <span class="title-line2">THE</span>
      <span class="title-line3">NEXUS</span>
    </h1>
    <p class="hero-sub">A new dimension awaits. Forge your identity, summon your character, and explore the void beyond reality.</p>
    <div class="hero-btns">
      <button class="btn-primary"><span>Begin Journey</span></button>
      <button class="btn-secondary">Watch Trailer</button>
    </div>
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-num">128K</div>
        <div class="stat-label">Active Users</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">40+</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">99.9%</div>
        <div class="stat-label">Uptime</div>
      </div>
    </div>
  </div>

  <!-- 3D SPINNING LOGO -->
  <div class="logo-3d-wrap">
    <div class="logo-rings">
      <div class="ring ring-1"><div class="ring-dot ring-dot-cyan"></div></div>
      <div class="ring ring-2"><div class="ring-dot ring-dot-purple"></div></div>
      <div class="ring ring-3"><div class="ring-dot ring-dot-pink"></div></div>
    </div>
