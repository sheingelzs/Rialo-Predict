<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Predict | Market Analysis Alpha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rialoBg: '#08090a', // Hitam yang lebih halus
                        rialoAccent: '#1e2023', // Abu-abu gelap untuk container
                        rialoLogo: '#FDFDD0' // Warna krem logo Anda
                    }
                }
            }
        }
    </script>
    <style>
        /* Tipografi kustom agar tidak standar browser */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-rialoBg text-white antialiased flex flex-col min-h-screen">

    <nav class="border-b border-gray-800 bg-rialoBg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-rialoLogo flex items-center justify-center font-bold text-rialoBg text-xl">R</div>
                <span class="text-xl font-bold tracking-tight">Rialo <span class="text-gray-500">Predict</span></span>
            </div>
            
            <div class="flex items-center space-x-2 bg-green-950/50 px-3 py-1 rounded-full border border-green-800">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </span>
                <p class="text-xs text-green-300 font-medium">LIVE</p>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-20">
        <div class="text-center max-w-2xl mx-auto flex flex-col items-center">
            
            <div class="mb-10 p-2 bg-rialoAccent rounded-3xl border border-gray-800 shadow-2xl shadow-rialoLogo/5">
                <img src="images/logo.png" alt="Rialo Alpha Logo" class="w-48 h-auto object-contain">
            </div>

            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-4 text-white leading-tight">
                Welcome to the <span class="text-gray-400">Market Prediction</span>
            </h1>
            <p class="text-lg text-gray-400 mb-10 max-w-lg">
                Analisa data cerdas untuk memprediksi pergerakan pasar Alpha. Akurat, cepat, dan transparan.
            </p>

            <a href="parlay.html" class="inline-flex items-center gap-2.5 bg-white text-rialoBg font-semibold px-8 py-3 rounded-full hover:bg-gray-200 transition-all duration-300 transform hover:scale-105 shadow-lg shadow-white/10">
                Mulai Prediksi
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </div>
    </main>

    </body>
</html>
