<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rialo Character Animation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050f0f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }

.stage {
  width: 800px; height: 540px;
  background: #0d2a2a;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,255,180,0.15);
}

.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,180,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,180,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

.bg-glow {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 600px; height: 240px;
  background: radial-gradient(ellipse, rgba(120,0,255,0.2) 0%, transparent 70%);
}

.ground-line {
  position: absolute; bottom: 90px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,255,180,0.4), transparent);
}

.char-wrap {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  width: 260px; height: 380px;
  transition: all 1.4s cubic-bezier(0.22,1,0.36,1);
}

.char-img {
  width: 100%; height: 100%;
  object-fit: contain; object-position: center bottom;
  filter: drop-shadow(0 0 20px rgba(255,80,80,0.4));
  transition: filter 0.5s;
}
.char-img.active {
  filter: drop-shadow(0 0 40px rgba(255,80,80,0.9)) drop-shadow(0 0 80px rgba(180,0,255,0.5));
}

.energy-head {
  position: absolute; top: 22px; right: 30px;
  width: 60px; height: 60px; pointer-events: none;
}
.energy-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid rgba(0,255,200,0);
}
.energy-ring.active {
  border-color: rgba(0,255,200,0.9);
  animation: ringPulse 0.5s ease-out infinite;
}
@keyframes ringPulse {
  0% { transform: scale(0.7); opacity: 1; }
  100% { transform: scale(1.8); opacity: 0; }
}

.spark {
  position: absolute; width: 3px; height: 16px;
  background: #00ffcc; border-radius: 2px;
  left: 50%; top: -10px; transform-origin: bottom center;
  opacity: 0;
}
.spark.active { animation: sparkAnim 0.35s ease-out infinite; }
@keyframes sparkAnim {
  0% { opacity: 1; transform: translateX(-50%) scaleY(1) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) scaleY(0.3) translateY(-20px); }
}

.sword-wrap {
  position: absolute; bottom: 90px; right: 190px;
  width: 16px; height: 220px;
  transform-origin: bottom center;
  transform: rotate(30deg);
  opacity: 0;
  transition: all 0.5s ease-out;
}
.sword-blade {
  width: 7px; height: 185px;
  background: linear-gradient(to bottom, #d0d8ff, #8890cc, #444);
  border-radius: 4px 4px 0 0; margin: 0 auto; position: relative;
}
.sword-energy-fx {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 18px; height: 185px;
  border-radius: 9px;
  background: linear-gradient(to bottom, rgba(170,0,255,0.95), rgba(100,0,200,0.4), transparent);
  opacity: 0; filter: blur(3px);
}
.sword-energy-fx.active { opacity: 1; animation: swordPulse 0.4s ease-in-out infinite; }
@keyframes swordPulse {
  0%,100% { opacity: 0.8; transform: translateX(-50%) scaleX(1); }
  50% { opacity: 1; transform: translateX(-50%) scaleX(1.5); }
}
.sword-guard { width: 26px; height: 8px; background: #7a6030; border-radius: 4px; margin: 0 auto; }
.sword-handle { width: 9px; height: 32px; background: #4a3018; border-radius: 3px; margin: 0 auto; }

.melon {
  position: absolute; width: 50px; height: 46px;
  border-radius: 50%; background: #3db832;
  border: 3px solid #2a8a1a;
  bottom: 220px; right: 240px; opacity: 0;
  transition: all 0.5s ease-out;
}
.melon::after {
  content: '';
  position: absolute; top: 8px; left: 8px;
  width: 30px; height: 3px;
  background: rgba(0,0,0,0.2); border-radius: 2px;
  box-shadow: 0 9px 0 rgba(0,0,0,0.15), 0 18px 0 rgba(0,0,0,0.1);
}

.melon-half {
  position: absolute; width: 26px; height: 46px;
  background: #e03030; border: 2px solid #b02020;
  opacity: 0; bottom: 220px;
  transition: all 0.4s ease-out;
}
.mh-l { border-radius: 26px 0 0 26px; right: 262px; }
.mh-r { border-radius: 0 26px 26px 0; right: 235px; transform: scaleX(-1); }

.slash-effect {
  position: absolute; bottom: 130px; right: 60px;
  width: 340px; height: 200px; opacity: 0;
  pointer-events: none; transition: opacity 0.1s;
}
.slash-line {
  position: absolute; height: 3px;
  background: linear-gradient(90deg, transparent, #cc44ff, #ffffff, transparent);
  border-radius: 2px; transform-origin: left center;
}

.burst {
  position: absolute; bottom: 170px; right: 200px;
  width: 140px; height: 140px; opacity: 0;
  pointer-events: none; transition: opacity 0.1s;
}
.burst-ring {
  position: absolute; inset: 14px; border-radius: 50%;
  border: 3px solid #cc44ff;
  animation: none;
}
.burst-ring.pop { animation: burstPop 0.4s ease-out forwards; }
@keyframes burstPop {
  0% { transform: scale(0.3); opacity: 1; }
  100% { transform: scale(1.8); opacity: 0; }
}
.burst-ray {
  position: absolute; width: 2px; height: 50px;
  background: linear-gradient(to top, #cc44ff, transparent);
  left: 50%; top: 0; transform-origin: bottom center;
}

.particles { position: absolute; inset: 0; pointer-events: none; }

.phase-label {
  position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
  font-size: 13px; color: rgba(0,255,180,0.75); letter-spacing: 3px;
  white-space: nowrap;
}

.controls {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 14px;
}
.btn {
  padding: 8px 24px;
  background: rgba(0,255,180,0.07);
  border: 1px solid rgba(0,255,180,0.3);
  border-radius: 20px;
  color: #00ffb4; font-size: 12px; cursor: pointer;
  font-family: monospace; letter-spacing: 1.5px;
  transition: all 0.2s;
}
.btn:hover { background: rgba(0,255,180,0.18); }
.btn.purple { border-color: rgba(180,0,255,0.5); color: #cc88ff; background: rgba(150,0,255,0.07); }
.btn.purple:hover { background: rgba(150,0,255,0.18); }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="ground-line"></div>
  <div class="particles" id="particles"></div>

  <div class="phase-label" id="phaseLabel">— STANDBY —</div>

  <div class="char-wrap" id="charWrap" style="transform:translateX(-50%) scale(0.5) translateY(100px); opacity:0.6;">
    <img class="char-img" id="charImg" src="IMG_1045.png" alt="Rialo Character"/>
    <div class="energy-head">
      <div class="energy-ring" id="energyRing"></div>
      <div class="spark" id="sp1" style="transform:rotate(0deg) translateX(-50%);transform-origin:bottom center;"></div>
      <div class="spark" id="sp2" style="transform:rotate(60deg);left:50%;top:-10px;transform-origin:bottom center;"></div>
      <div class="spark" id="sp3" style="transform:rotate(120deg);left:50%;top:-10px;transform-origin:bottom center;"></div>
      <div class="spark" id="sp4" style="transform:rotate(180deg);left:50%;top:-10px;transform-origin:bottom center;"></div>
      <div class="spark" id="sp5" style="transform:rotate(240deg);left:50%;top:-10px;transform-origin:bottom center;"></div>
      <div class="spark" id="sp6" style="transform:rotate(300deg);left:50%;top:-10px;transform-origin:bottom center;"></div>
    </div>
  </div>

  <div class="sword-wrap" id="swordWrap">
    <div class="sword-blade">
      <div class="sword-energy-fx" id="swordFx"></div>
    </div>
    <div class="sword-guard"></div>
    <div class="sword-handle"></div>
  </div>

  <div class="melon" id="melon"></div>
  <div class="melon-half mh-l" id="mhL"></div>
  <div class="melon-half mh-r" id="mhR"></div>

  <div class="slash-effect" id="slashFx">
    <div class="slash-line" style="top:38%;width:300px;transform:rotate(-18deg);"></div>
    <div class="slash-line" style="top:52%;width:240px;transform:rotate(-14deg);opacity:0.6;"></div>
    <div class="slash-line" style="top:26%;width:180px;transform:rotate(-24deg);opacity:0.35;"></div>
  </div>

  <div class="burst" id="burst">
    <div class="burst-ring" id="burstRing"></div>
    <div class="burst-ray" style="transform:rotate(0deg) translateX(-50%);"></div>
    <div class="burst-ray" style="transform:rotate(45deg) translateX(-50%);"></div>
    <div class="burst-ray" style="transform:rotate(90deg) translateX(-50%);"></div>
    <div class="burst-ray" style="transform:rotate(135deg) translateX(-50%);"></div>
    <div class="burst-ray" style="transform:rotate(180deg) translateX(-50%);"></div>
    <div class="burst-ray" style="transform:rotate(225deg) translateX(-50%);"></div>
    <div class="burst-ray" style="transform:rotate(270deg) translateX(-50%);"></div>
    <div class="burst-ray" style="transform:rotate(315deg) translateX(-50%);"></div>
  </div>

  <div class="controls">
    <button class="btn" id="btnPlay" onclick="startSeq()">▶ JALANKAN</button>
    <button class="btn purple" onclick="resetAll()">↺ RESET</button>
  </div>
</div>

<script>
const charWrap = document.getElementById('charWrap');
const charImg = document.getElementById('charImg');
const energyRing = document.getElementById('energyRing');
const swordWrap = document.getElementById('swordWrap');
const swordFx = document.getElementById('swordFx');
const melon = document.getElementById('melon');
const mhL = document.getElementById('mhL');
const mhR = document.getElementById('mhR');
const slashFx = document.getElementById('slashFx');
const burst = document.getElementById('burst');
const burstRing = document.getElementById('burstRing');
const phaseLabel = document.getElementById('phaseLabel');
const btnPlay = document.getElementById('btnPlay');
const particlesCont = document.getElementById('particles');
const sparks = document.querySelectorAll('.spark');
let running = false;
let flameInt = null;

function label(t) { phaseLabel.textContent = t; }

function spawnParticle(x, bottom, color) {
  const p = document.createElement('div');
  p.style.cssText = `position:absolute;width:9px;height:14px;border-radius:50% 50% 30% 30%;background:${color};left:${x}px;bottom:${bottom}px;opacity:1;pointer-events:none;`;
  particlesCont.appendChild(p);
  let vy = 1.5 + Math.random()*2.5, vx = (Math.random()-0.5)*2.5, op = 1, by = bottom;
  const t = setInterval(() => {
    by += vy; p.style.left = (parseFloat(p.style.left)+vx)+'px';
    op -= 0.035; p.style.bottom = by+'px'; p.style.opacity = op;
    if(op <= 0) { clearInterval(t); p.remove(); }
  }, 16);
}

function flames(on) {
  if(!on) return;
  const fc = ['#ff4400','#ff8800','#ffaa00'];
  const pc = ['#cc44ff','#9900ff'];
  for(let i=0;i<5;i++) spawnParticle(360+Math.random()*80-40, 260+Math.random()*50, fc[Math.floor(Math.random()*3)]);
  for(let i=0;i<3;i++) spawnParticle(230+Math.random()*60-30, 150+Math.random()*40, pc[Math.floor(Math.random()*2)]);
}

function startSeq() {
  if(running) return;
  running = true;
  btnPlay.style.opacity = '0.4';

  label('— APPROACH —');
  charWrap.style.transition = 'all 1.5s cubic-bezier(0.22,1,0.36,1)';
  charWrap.style.transform = 'translateX(-50%) scale(1) translateY(0px)';
  charWrap.style.opacity = '1';

  setTimeout(() => {
    label('— ARMS READY —');
    swordWrap.style.opacity = '1';
    melon.style.opacity = '1';
  }, 1500);

  setTimeout(() => {
    label('— ENERGY AWAKENS —');
    energyRing.classList.add('active');
    sparks.forEach(s => s.classList.add('active'));
    charImg.classList.add('active');
    swordFx.classList.add('active');
    flameInt = setInterval(() => flames(true), 100);
  }, 2800);

  setTimeout(() => {
    label('— THROW —');
    melon.style.transition = 'all 0.55s cubic-bezier(0.5,-0.4,0.8,1)';
    melon.style.right = '340px';
    melon.style.bottom = '330px';
    melon.style.transform = 'rotate(400deg) scale(0.8)';
  }, 4000);

  setTimeout(() => {
    melon.style.transition = 'all 0.2s ease-in';
    melon.style.right = '210px';
    melon.style.bottom = '220px';
    melon.style.transform = 'rotate(720deg) scale(1)';
  }, 4560);

  setTimeout(() => {
    label('— SLASH —');
    melon.style.opacity = '0';
    swordWrap.style.transition = 'all 0.1s ease-in';
    swordWrap.style.transform = 'rotate(-65deg) translateY(-40px)';
    slashFx.style.opacity = '1';
    for(let i=0;i<14;i++) {
      setTimeout(() => {
        spawnParticle(160+Math.random()*140, 150+Math.random()*70, i%2===0?'#cc44ff':'#ff6600');
      }, i*18);
    }
  }, 4800);

  setTimeout(() => {
    mhL.style.opacity = '1'; mhR.style.opacity = '1';
    mhL.style.right = '290px'; mhL.style.bottom = '250px';
    mhR.style.right = '222px'; mhR.style.bottom = '230px';
    burst.style.opacity = '1';
    burstRing.classList.add('pop');
  }, 4960);

  setTimeout(() => { slashFx.style.opacity = '0'; }, 5300);
  setTimeout(() => { burst.style.opacity = '0'; burstRing.classList.remove('pop'); }, 5400);

  setTimeout(() => {
    label('— POWER UNLEASHED —');
    swordWrap.style.transition = 'all 0.5s ease-out';
    swordWrap.style.transform = 'rotate(-8deg)';
    charWrap.style.filter = 'drop-shadow(0 0 50px #cc44ff) drop-shadow(0 0 20px #ff4400)';
  }, 5500);

  setTimeout(() => {
    label('— COMPLETE —');
    btnPlay.style.opacity = '1';
    running = false;
    if(flameInt) { clearInterval(flameInt); flameInt = null; }
  }, 7500);
}

function resetAll() {
  running = false;
  if(flameInt) { clearInterval(flameInt); flameInt = null; }
  particlesCont.innerHTML = '';
  charWrap.style.transition = 'all 0.5s';
  charWrap.style.transform = 'translateX(-50%) scale(0.5) translateY(100px)';
  charWrap.style.opacity = '0.6';
  charWrap.style.filter = '';
  charImg.classList.remove('active');
  energyRing.classList.remove('active');
  sparks.forEach(s => s.classList.remove('active'));
  swordWrap.style.transition = 'all 0.4s';
  swordWrap.style.opacity = '0';
  swordWrap.style.transform = 'rotate(30deg)';
  swordFx.classList.remove('active');
  melon.style.opacity = '0';
  melon.style.right = '240px'; melon.style.bottom = '220px'; melon.style.transform = '';
  mhL.style.opacity = '0'; mhR.style.opacity = '0';
  mhL.style.right = '262px'; mhR.style.right = '235px';
  mhL.style.bottom = '220px'; mhR.style.bottom = '220px';
  slashFx.style.opacity = '0';
  burst.style.opacity = '0';
  burstRing.classList.remove('pop');
  btnPlay.style.opacity = '1';
  label('— STANDBY —');
}
</script>
</body>
</html>
