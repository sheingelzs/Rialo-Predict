<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS — Enter The Void</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#7c3aed;
  --cyan:#06b6d4;
  --pink:#ec4899;
  --dark:#050010;
  --dark2:#0d0020;
  --dark3:#110028;
  --text:#e2e8f0;
  --muted:#94a3b8;
}
html{scroll-behavior:smooth;}
body{
  background:var(--dark);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
}

/* CURSOR */
#cursor{
  position:fixed;
  width:14px;height:14px;
  background:var(--cyan);
  border-radius:50%;
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  transition:width 0.2s,height 0.2s,background 0.2s;
  top:0;left:0;
}
#cursor-trail{
  position:fixed;
  width:36px;height:36px;
  border:1.5px solid rgba(124,58,237,0.7);
  border-radius:50%;
  pointer-events:none;
  z-index:99998;
  transform:translate(-50%,-50%);
  top:0;left:0;
  transition:width 0.2s,height 0.2s;
}

/* NAVBAR */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 4rem;
  background:rgba(5,0,16,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(124,58,237,0.2);
}
.logo{
  font-family:'Orbitron',monospace;
  font-weight:900;font-size:1.4rem;
  color:var(--cyan);
  letter-spacing:4px;
}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{
  color:var(--muted);font-size:0.85rem;
  letter-spacing:2px;text-decoration:none;
  text-transform:uppercase;font-weight:600;
  transition:color 0.3s;
}
.nav-links a:hover{color:var(--cyan);}
.nav-btn{
  padding:0.5rem 1.5rem;
  border:1px solid var(--cyan);
  background:transparent;color:var(--cyan);
  font-family:'Rajdhani',sans-serif;
  font-size:0.85rem;letter-spacing:2px;
  text-transform:uppercase;font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.nav-btn:hover{background:var(--cyan);color:var(--dark);}

/* HERO GRID LAYOUT - FIXED STRATEGIS */
#hero{
  min-height:100vh;
  position:relative;
  padding: 6rem 4rem 2rem 4rem;
  overflow:hidden;
  display: flex;
  align-items: center;
}
.hero-wrapper {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 2rem;
  align-items: center;
}
.hero-bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 60% at 70% 50%, rgba(124,58,237,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 30% 80%, rgba(236,72,153,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 30% 30% at 80% 20%, rgba(6,182,212,0.08) 0%, transparent 60%);
}
.grid-bg{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
  background-size:60px 60px;
}
.scanline{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px
  );
}
.hero-content{
  max-width:580px;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:0.3rem 1rem;
  border:1px solid rgba(6,182,212,0.4);
  color:var(--cyan);font-size:0.75rem;
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:1.5rem;
  animation:fadeUp 0.8s ease both;
}
.hero-tag::before{
  content:'';width:6px;height:6px;
  background:var(--cyan);border-radius:50%;
  animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.hero-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(2.5rem, 5.5vw, 4.5rem);
  font-weight:900;line-height:0.95;
  text-transform:uppercase;
  margin-bottom:1.5rem;
  animation:fadeUp 0.8s 0.1s ease both;
}
.title-line1{display:block;color:var(--text);}
.title-line2{display:block;color:transparent;-webkit-text-stroke:1px var(--purple);}
.title-line3{
  display:block;
  background:linear-gradient(90deg,var(--cyan),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-sub{
  color:var(--muted);font-size:1rem;line-height:1.8;letter-spacing:0.5px;
  margin-bottom:2.5rem;
  animation:fadeUp 0.8s 0.2s ease both;
}
.hero-btns{
  display:flex;gap:1rem;flex-wrap:wrap;
  animation:fadeUp 0.8s 0.3s ease both;
}
.btn-primary{
  padding:0.9rem 2.5rem;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border:none;
  font-family:'Rajdhani',sans-serif;font-size:0.9rem;
  letter-spacing:3px;text-transform:uppercase;font-weight:700;
  cursor:pointer;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
  transition:opacity 0.3s;
}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{
  padding:0.9rem 2.5rem;
  background:transparent;
  border:1px solid rgba(124,58,237,0.5);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:0.9rem;
  letter-spacing:3px;text-transform:uppercase;font-weight:600;
  cursor:pointer;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
  transition:all 0.3s;
}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan);}

.stats-bar{
  display:flex;gap:3rem;margin-top:3rem;
  padding-top:2rem;
  border-top:1px solid rgba(124,58,237,0.2);
  animation:fadeUp 0.8s 0.4s ease both;
}
.stat-num{
  font-family:'Orbitron',monospace;
  font-size:1.8rem;font-weight:900;color:var(--cyan);
}
.stat-label{font-size:0.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

/* === HOLOGRAPHIC SPHERE - STRATEGIC CENTER KUNCI TOTAL === */
.logo-33d-wrap{
  position: relative;
  width: 100%;
  height: 420px;
  display: flex;
  align-items: center;     /* Mengunci tengah vertikal */
  justify-content: center;   /* Mengunci tengah horizontal */
  animation: fadeUp 1s 0.4s ease both;
}
.logo-rings{
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.ring{position:absolute;border-radius:50%;border-style:solid;}
.ring-1{
  width:390px;height:390px;
  border-width:1px;border-color:rgba(124,58,237,0.3);
  animation:spinCW 18s linear infinite;
}
.ring-2{
  width:315px;height:315px;
  border-width:1px;border-color:rgba(6,182,212,0.35);
  border-style:dashed;
  animation:spinCCW 12s linear infinite;
}
.ring-3{
  width:245px;height:245px;
  border-width:1px;border-color:rgba(236,72,153,0.25);
  animation:spinCW 8s linear infinite;
}
.ring-dot{
  position:absolute;width:8px;height:8px;
  border-radius:50%;top:-4px;left:50%;transform:translateX(-50%);
}
.dot-cyan{background:var(--cyan);box-shadow:0 0 10px var(--cyan);}
.dot-purple{background:var(--purple);box-shadow:0 0 10px var(--purple);}
.dot-pink{background:var(--pink);box-shadow:0 0 8px var(--pink);}

/* Wadah box mandiri yang diletakkan relatif pas di tengah koordinat ring */
.logo-container-fixed {
  position: absolute;
  z-index: 5;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: logoFloatAlaRialo 4s ease-in-out infinite;
}

.logo-muter{
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  animation: neonPulseAlaRialo 3s ease-in-out infinite;
}

@keyframes logoFloatAlaRialo {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-12px); /* Mengambang seimbang */
  }
}

@keyframes neonPulseAlaRialo {
  0%, 100% {
    filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.5)) drop-shadow(0 0 35px rgba(124, 58, 237, 0.3));
  }
  50% {
    filter: drop-shadow(0 0 30px rgba(6, 182, 212, 0.8)) drop-shadow(0 0 55px rgba(124, 58, 237, 0.6));
  }
}

.logo-glow{
  position:absolute;
  bottom: 0px; /* Diatur seimbang di bawah ring */
  left:50%;
  transform:translateX(-50%);
  width:220px;height:30px;
  background:radial-gradient(ellipse,rgba(124,58,237,0.45) 0%,transparent 70%);
  border-radius:50%;
  animation:glowPulse 3s ease-in-out infinite;
  pointer-events:none;
}

@keyframes spinCW{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes spinCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes glowPulse{
  0%,100%{opacity:0.8;transform:translateX(-50%) scale(1);}
  50%{opacity:0.4;transform:translateX(-50%) scale(1.3);}
}

/* SECTIONS */
section{padding:6rem 4rem;}
.section-tag{
  font-family:'Orbitron',monospace;
  font-size:0.7rem;letter-spacing:4px;
  color:var(--cyan);text-transform:uppercase;margin-bottom:0.8rem;
}
.section-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(1.8rem,3vw,2.8rem);
  font-weight:900;text-transform:uppercase;
  line-height:1.1;margin-bottom:1rem;
}

/* EXPLORE */
#explore{background:var(--dark2);position:relative;}
#explore::before{
  content:'';position:absolute;top:-100px;left:-100px;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1.5rem;margin-top:3rem;
}
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(124,58,237,0.2);
  padding:2rem;position:relative;overflow:hidden;
  transition:all 0.4s;
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.07) 0%,transparent 50%);
  opacity:0;transition:opacity 0.4s;
}
.card:hover{border-color:rgba(6,182,212,0.5);transform:translateY(-5px);}
.card:hover::before{opacity:1;}
.card-icon{
  width:50px;height:50px;
  border:1px solid rgba(6,182,212,0.3);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1.2rem;font-size:1.4rem;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  background:rgba(6,182,212,0.05);
}
.card-title{
  font-family:'Orbitron',monospace;font-size:0.9rem;
  font-weight:700;letter-spacing:2px;margin-bottom:0.8rem;
}
.card-desc{color:var(--muted);font-size:0.9rem;line-height:1.7;}
.card-tag{
  display:inline-block;margin-top:1.2rem;
  padding:0.2rem 0.8rem;
  border:1px solid rgba(124,58,237,0.4);
  color:var(--purple);font-size:0.7rem;
  letter-spacing:2px;text-transform:uppercase;
}

/* FEATURE */
#feature{position:relative;}
.feature-inner{
  display:grid;grid-template-columns:1fr 1fr;
  gap:5rem;align-items:center;
}
.feature-box{
  background:rgba(124,58,237,0.05);
  border:1px solid rgba(124,58,237,0.25);
  padding:2.5rem;
  clip-path:polygon(0 0,calc(100% - 30px) 0,100% 30px,100% 100%,30px 100%,0 calc(100% - 30px));
  position:relative;
}
.corner-tl,.corner-br{position:absolute;width:20px;height:20px;}
.corner-tl{top:0;left:0;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.corner-br{bottom:0;right:0;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}
.hud-wrap{
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1;
}
.hud-ring{
  width:220px;height:220px;border-radius:50%;
  border:1px solid rgba(6,182,212,0.3);
  display:flex;align-items:center;justify-content:center;
  position:relative;animation:spinCW 20s linear infinite;
}
.hud-ring::before{
  content:'';position:absolute;
  width:175px;height:175px;border-radius:50%;
  border:1px dashed rgba(124,58,237,0.4);
}
.hud-ring::after{
  content:'';position:absolute;
  width:128px;height:128px;border-radius:50%;
  border:2px solid rgba(236,72,153,0.3);
}
.hud-core{
  width:78px;height:78px;border-radius:50%;
  border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:0.55rem;
  letter-spacing:1.5px;color:var(--cyan);z-index:1;
  text-align:center;
}
.hud-dot2{
  position:absolute;width:8px;height:8px;border-radius:50%;
  background:var(--cyan);top:-4px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 10px var(--cyan);
}
.feature-list{margin-top:2rem;}
.feature-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid rgba(124,58,237,0.12);}
.feature-item:last-child{border-bottom:none;}
.fdot{width:8px;height:8px;min-width:8px;background:var(--cyan);border-radius:50%;margin-top:6px;box-shadow:0 0 8px var(--cyan);}
.feature-text h4{font-size:0.9rem;letter-spacing:1px;margin-bottom:0.3rem;}
.feature-text p{color:var(--muted);font-size:0.85rem;line-height:1.6;}

/* CHARACTERS */
#characters{background:var(--dark3);}
.char-showcase{
  display:flex;gap:1.5rem;margin-top:3rem;
  overflow-x:auto;padding-bottom:1rem;
}
.char-showcase::-webkit-scrollbar{height:3px;}
.char-showcase::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}
.char-card{
  min-width:190px;flex-shrink:0;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(124,58,237,0.2);
  padding:1.5rem 1rem;text-align:center;
  transition:all 0.4s;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
}
.char-card:hover{border-color:var(--pink);transform:translateY(-6px);}
.char-card.active{border-color:var(--cyan);}
.char-avatar{
  width:90px;height:90px;border-radius:50%;
  margin:0 auto 1rem;
  border:2px solid rgba(124,58,237,0.3);
  background:rgba(124,58,237,0.08);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.char-name{
  font-family:'Orbitron',monospace;font-size:0.8rem;
  letter-spacing:2px;margin-bottom:0.3rem;
}
.char-role{color:var(--muted);font-size:0.75rem;letter-spacing:1px;}
.char-power{
  margin-top:0.8rem;padding:0.2rem 0.6rem;
  background:rgba(236,72,153,0.08);
  border:1px solid rgba(236,72,153,0.3);
  color:var(--pink);font-size:0.65rem;
  letter-spacing:2px;text-transform:uppercase;display:inline-block;
}

/* CTA */
#cta{text-align:center;position:relative;}
#cta::before{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:600px;height:400px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(124,58,237,0.1) 0%,transparent 70%);
  pointer-events:none;
}
.cta-inner{position:relative;z-index:1;}
.cta-line{
  width:100px;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  margin:1.5rem auto;
}
.cta-sub{color:var(--muted);font-size:1rem;letter-spacing:2px;margin-bottom:2.5rem;}

<footer>
  <div class="footer-logo">NEXUS</div>
  <div class="footer-copy">© 2077 NEXUS CORP. ALL RIGHTS RESERVED.</div>
  <div class="footer-links">
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="#">Contact</a>
  </div>
</footer>

<script>
/* ---- CURSOR ---- */
const cur = document.getElementById('cursor');
const trail = document.getElementById('cursor-trail');
let mx = 0, my = 0, tx = 0, ty = 0;
document.addEventListener('mousemove', function(e) {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px'; cur.style.top = my + 'px';
});
(function animateTrail() {
  tx += (mx - tx) * 0.13; ty += (my - ty) * 0.13;
  trail.style.left = tx + 'px'; trail.style.top = ty + 'px';
  requestAnimationFrame(animateTrail);
})();
document.querySelectorAll('a, button, .char-card, .card').forEach(function(el) {
  el.addEventListener('mouseenter', function() {
    cur.style.width='28px';cur.style.height='28px';cur.style.background='var(--pink)';
    trail.style.width='55px';trail.style.height='55px';
  });
  el.addEventListener('mouseleave', function() {
    cur.style.width='14px';cur.style.height='14px';cur.style.background='var(--cyan)';
    trail.style.width='36px';trail.style.height='36px';
  });
});

/* ---- PARTICLES ---- */
const pcanvas = document.getElementById('particles-canvas');
const pctx = pcanvas.getContext('2d');
function resizeCanvas() { pcanvas.width=window.innerWidth; pcanvas.height=window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
const pts = [];
for (var i = 0; i < 55; i++) {
  pts.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    vx:(Math.random()-0.5)*0.35, vy:(Math.random()-0.5)*0.35,
    r:Math.random()*1.8+0.4, c:Math.random()>0.5?'124,58,237':'6,182,212' });
}
(function drawParticles() {
  pctx.clearRect(0,0,pcanvas.width,pcanvas.height);
  pts.forEach(function(p) {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>pcanvas.width) p.vx*=-1;
    if(p.y<0||p.y>pcanvas.height) p.vy*=-1;
    pctx.beginPath(); pctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pctx.fillStyle='rgba('+p.c+',0.55)'; pctx.fill();
  });
  for (var i=0;i<pts.length;i++) for(var j=i+1;j<pts.length;j++){
    var dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<115){ pctx.beginPath(); pctx.moveTo(pts[i].x,pts[i].y); pctx.lineTo(pts[j].x,pts[j].y);
      pctx.strokeStyle='rgba(124,58,237,'+(0.12*(1-d/115))+')'; pctx.lineWidth=0.5; pctx.stroke(); }
  }
  requestAnimationFrame(drawParticles);
})();

/* ---- SCROLL REVEAL ---- */
var reveals = document.querySelectorAll('.reveal');
var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry, i) {
    if (entry.isIntersecting) {
      setTimeout(function() { entry.target.classList.add('visible'); }, i * 80);
    }
  });
}, { threshold: 0.1 });
reveals.forEach(function(el) { observer.observe(el); });

/* ---- CHAR CARD SELECT ---- */
document.querySelectorAll('.char-card').forEach(function(card) {
  card.addEventListener('click', function() {
    document.querySelectorAll('.char-card').forEach(function(c) { c.classList.remove('active'); });
    card.classList.add('active');
  });
});
</script>
</body>
</html>
