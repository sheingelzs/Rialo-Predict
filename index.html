<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO — Prediction Market</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet"/>
<style>
/* ... (Style dasar tetep sama) ... */
:root {
  --bg: #050810; --accent: #4ade80; --text: #e8eaf0; --border: #1a2a42;
}
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; }

/* NAV STYLES */
.nav { display: flex; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; background: rgba(5,8,16,0.9); backdrop-filter: blur(10px); z-index: 100; }
.nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }

/* ANIMASI LOGO MUTER 3D */
.hero-logo-container {
    perspective: 1000px;
    margin-bottom: 30px;
}
.floating-logo {
    font-family: 'Syne', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    animation: rotate3D 5s infinite linear;
    transform-style: preserve-3d;
    display: flex;
    align-items: center;
    gap: 15px;
}
@keyframes rotate3D {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
}

/* PAGES */
.page { display: none; padding: 2rem; }
.page.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* MARKET CARDS */
.mkt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
.mkt-card { background: #0f1929; border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
.btn-main { background: var(--accent); color: #000; padding: 12px 30px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo" onclick="showPage('landing')"><div class="logo-dot"></div>RIALO</div>
  <div style="display:flex; gap:10px;">
    <button onclick="showPage('market')" style="background:none; border:none; color:#fff; cursor:pointer;">Market</button>
    <button class="btn-main" style="margin:0; padding:5px 15px; font-size:0.8rem;">Connect</button>
  </div>
</nav>

<div class="page active" id="page-landing">
  <div style="text-align:center; min-height:70vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    
    <div class="hero-logo-container">
        <div class="floating-logo">
            <div class="logo-dot" style="width:20px; height:20px;"></div>
            RIALO
        </div>
    </div>

    <h1 style="font-family:'Syne'; font-size:2.5rem;">Web3 Prediction <span style="color:var(--accent)">Engine</span></h1>
    <p style="color:#5a7090; margin-top:10px;">Build by Gelz & Sheina</p>
    <button class="btn-main" onclick="showPage('market')">Start Trading</button>
  </div>
</div>

<div class="page" id="page-market">
  <h2 style="font-family:'Syne'; margin-bottom:20px;">Live Prices (Binance)</h2>
  <div class="mkt-grid" id="market-list">
    <p>Loading market data...</p>
  </div>
</div>

<script>
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if(id === 'market') fetchPrices();
}

async function fetchPrices() {
  const list = document.getElementById('market-list');
  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.binance.com/api/v3/ticker/price')}`);
    const raw = await res.json();
    const data = JSON.parse(raw.contents);
    const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT'];
    
    list.innerHTML = data.filter(c => symbols.includes(c.symbol)).map(c => `
      <div class="mkt-card">
        <div style="font-size:0.8rem; color:#5a7090;">${c.symbol}</div>
        <div style="font-size:1.5rem; font-weight:700; color:var(--accent);">$${parseFloat(c.price).toLocaleString()}</div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = "Gagal ambil data.";
  }
}

// Update tiap 10 detik
setInterval(fetchPrices, 10000);
</script>

</body>
</html>
