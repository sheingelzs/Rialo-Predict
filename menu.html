<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Ecosystem - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #050811; 
            overflow: hidden; 
            font-family: 'Space Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- BACKGROUND DIGITAL (MURNI CSS) --- */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #0b1120 0%, #050811 100%);
        }

        /* Garis Grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 245, 196, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 245, 196, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* Efek Cahaya Bergerak (Digital Pulse) */
        .pulse-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 196, 0.2), transparent);
            animation: moveDown 6s linear infinite;
        }

        @keyframes moveDown {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        /* --- MENU LAYOUT --- */
        .menu-container {
            display: flex;
            gap: 100px;
            z-index: 10;
        }

        .menu-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s ease;
        }

        .menu-card img {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(0, 245, 196, 0.1));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-card:hover img {
            transform: translateY(-20px) scale(1.1);
            filter: drop-shadow(0 0 30px rgba(0, 245, 196, 0.4));
        }

        .menu-title {
            margin-top: 30px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 5px;
            color: #5a7090;
            transition: 0.3s;
        }

        .menu-card:hover .menu-title {
            color: #00f5c4;
            text-shadow: 0 0 10px rgba(0, 245, 196, 0.5);
        }

        @media (max-width: 768px) {
            .menu-container { flex-direction: column; gap: 60px; }
            .menu-card img { width: 160px; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="grid-bg"></div>
        <div class="pulse-line" style="animation-delay: 0s;"></div>
        <div class="pulse-line" style="animation-delay: 3s;"></div>
    </div>

    <div class="menu-container">
        <a href="parlay.html" class="menu-card">
            <img src="images/parlay.png" alt="Parlay">
            <div class="menu-title">PARLAY</div>
        </a>

        <a href="markett.html" class="menu-card">
            <img src="images/markett.png" alt="Market">
            <div class="menu-title">MARKET</div>
        </a>
    </div>

</body>
</html>
