<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Flower Menu</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(to bottom,#ffb6d9,#ff69b4);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  position:relative;
  flex-direction:column;
}

/* 🌸 Flower animation */
.flower{
  position:absolute;
  top:-50px;
  font-size:24px;
  animation:fall linear infinite;
  opacity:0.8;
}

@keyframes fall{
  0%{transform:translateY(-50px) translateX(0);}
  100%{transform:translateY(110vh) translateX(30px);}
}

/* Menu Layout */

.menu-container{
  width:90%;
  max-width:1100px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:120px;
  z-index:2;
}

.menu-item{
  text-align:center;
}

.menu-item img{
  width:22vw;
  max-width:200px;
  min-width:120px;
  height:auto;
  object-fit:contain;
  cursor:pointer;
  transition:0.4s;
}

.menu-item img:hover{
  transform:scale(1.15);
  filter:drop-shadow(0 0 40px #fff);
}

.menu-title{
  margin-top:25px;
  font-size:clamp(18px,3vw,28px);
  font-weight:800;
  letter-spacing:3px;
  color:white;
  text-shadow:0 0 15px rgba(255,255,255,0.9);
}

/* Footer */

.footer{
  position:absolute;
  bottom:15px;
  width:90%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  font-weight:bold;
  z-index:5;
}

.footer-center{
  text-align:center;
  line-height:1.6;
}

.footer a{
  text-decoration:none;
  color:white;
}

/* Logo Social */

.social-icon{
  width:28px;
  transition:0.3s;
}

.social-icon:hover{
  transform:scale(1.2);
  filter:drop-shadow(0 0 10px white);
}

/* Responsive */

@media(max-width:768px){

.menu-container{
  flex-direction:column;
  gap:70px;
}

.footer{
  font-size:14px;
}

.social-icon{
  width:24px;
}

}

</style>
</head>

<body>

<!-- 🌸 Flowers -->
<div class="flower" style="left:10%; animation-duration:10s;">🌸</div>
<div class="flower" style="left:25%; animation-duration:12s;">🌸</div>
<div class="flower" style="left:40%; animation-duration:8s;">🌸</div>
<div class="flower" style="left:55%; animation-duration:14s;">🌸</div>
<div class="flower" style="left:70%; animation-duration:9s;">🌸</div>
<div class="flower" style="left:85%; animation-duration:11s;">🌸</div>

<div class="menu-container">

<!-- PARLAY -->
<div class="menu-item">
<a href="parlay.html">
<img src="images/parlay.png">
</a>
<div class="menu-title">PARLAY 🌸</div>
</div>

<!-- MARKET -->
<div class="menu-item">
<a href="markett.html">
<img src="images/markett.png">
</a>
<div class="menu-title">MARKET 🌸</div>
</div>

</div>

<!-- Footer -->

<div class="footer">

<!-- X -->
<div>
<a href="https://x.com/rialohq?s=21" target="_blank">
<img src="images/x.png" class="social-icon">
</a>
</div>

<!-- Tengah -->
<div class="footer-center">
<div>
<a href="https://x.com/rayhn_1991?s=21" target="_blank">Gelz</a>
</div>
<div>
<a href="https://x.com/sheinasalisha?s=21" target="_blank">Sheina</a>
</div>
</div>

<!-- Discord -->
<div>
<a href="https://discord.gg/rialoprotocol" target="_blank">
<img src="images/discord.png" class="social-icon">
</a>
</div>

</div>

</body>
</html>
