<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RIALO — Identity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
:root {
  --c: #00d4e8;
  --c2: #7c3aff;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --bg: #020408;
  --bg2: #030810;
  --glass: rgba(0,212,232,0.04);
  --glass2: rgba(255,255,255,0.02);
  --border: rgba(0,212,232,0.12);
  --border2: rgba(0,212,232,0.22);
  --txt: rgba(255,255,255,0.85);
  --txt2: rgba(255,255,255,0.4);
  --nav-h: 64px;
  --ease: cubic-bezier(0.16,1,0.3,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--txt); font-family:'Syne',sans-serif; overflow-x:hidden; }

/* ── NOISE OVERLAY ── */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* ── AMBIENT GLOW ── */
.ambient {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 800px 600px at 15% 20%, rgba(0,212,232,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 600px 800px at 85% 80%, rgba(124,58,255,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 50% 50%, rgba(0,212,232,0.03) 0%, transparent 60%);
}

/* ── GRID PATTERN ── */
.grid-bg {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(0,212,232,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,232,0.04) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
}

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; height:var(--nav-h); z-index:100;
  display:flex; align-items:center; padding:0 32px; gap:40px;
  background:rgba(2,4,8,0.85); backdrop-filter:blur(32px);
  border-bottom:1px solid rgba(0,212,232,0.08);
}
nav::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--c), rgba(124,58,255,0.8), transparent);
}
.logo {
  font-family:'Orbitron',monospace; font-size:18px; font-weight:900;
  color:#fff; text-decoration:none; letter-spacing:0.15em;
  display:flex; align-items:center; gap:10px;
}
.logo-dot {
  width:8px; height:8px; border-radius:50%; background:var(--c);
  box-shadow:0 0 12px var(--c), 0 0 24px rgba(0,212,232,0.4);
  animation:logopulse 2s ease infinite;
}
@keyframes logopulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }

.nav-links { display:flex; gap:6px; flex:1; justify-content:center; }
.nav-links a {
  padding:7px 14px; font-size:11px; font-weight:600; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--txt2); text-decoration:none;
  border-radius:4px; transition:all 0.2s; position:relative;
}
.nav-links a:hover { color:var(--txt); background:rgba(255,255,255,0.04); }
.nav-links a.active {
  color:var(--c);
  background:rgba(0,212,232,0.08);
  border:1px solid rgba(0,212,232,0.18);
}
.nav-links a.active::after {
  content:''; position:absolute; bottom:-1px; left:20%; right:20%; height:1px;
  background:var(--c); box-shadow:0 0 8px var(--c);
}

.nav-right { display:flex; align-items:center; gap:10px; }
.chain-badge {
  display:flex; align-items:center; gap:7px; padding:6px 14px;
  background:rgba(0,212,232,0.06); border:1px solid var(--border);
  border-radius:6px; font-family:'Space Mono',monospace; font-size:9px; color:var(--c);
}
.chain-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.btn-connect {
  padding:9px 20px; background:var(--c); color:#000; border:none;
  border-radius:6px; font-family:'Orbitron',monospace; font-size:9px;
  font-weight:700; letter-spacing:0.1em; cursor:pointer;
  transition:all 0.2s; text-transform:uppercase;
  box-shadow:0 0 20px rgba(0,212,232,0.3);
}
.btn-connect:hover { box-shadow:0 0 32px rgba(0,212,232,0.5); transform:translateY(-1px); }

/* ── PAGE SCROLL ── */
.page-scroll {
  position:fixed; inset:0; top:var(--nav-h); bottom:52px;
  overflow-y:auto; overflow-x:hidden; z-index:10;
  scrollbar-width:thin; scrollbar-color:rgba(0,212,232,0.15) transparent;
}
.page-scroll::-webkit-scrollbar { width:2px; }
.page-scroll::-webkit-scrollbar-thumb { background:rgba(0,212,232,0.2); border-radius:2px; }

.inner { max-width:1100px; margin:0 auto; padding:32px 28px 100px; }

/* ── HERO PROFILE ── */
.id-hero {
  position:relative; display:grid; grid-template-columns:auto 1fr auto;
  gap:28px; align-items:center; padding:32px; margin-bottom:14px;
  background:rgba(0,212,232,0.025);
  border:1px solid rgba(0,212,232,0.15);
  border-radius:12px; overflow:hidden;
}
.id-hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 400px 200px at 30% 50%, rgba(0,212,232,0.06), transparent),
    radial-gradient(ellipse 300px 300px at 90% 50%, rgba(124,58,255,0.05), transparent);
}
.id-hero::after {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--c), rgba(124,58,255,0.8), transparent);
}

/* Holographic avatar */
.avatar-wrap { position:relative; width:88px; height:88px; flex-shrink:0; }
.avatar-ring {
  position:absolute; inset:-6px; border-radius:50%;
  border:1.5px solid rgba(0,212,232,0.3);
  animation:ring-spin 8s linear infinite;
}
.avatar-ring::before {
  content:''; position:absolute; top:-3px; left:50%; width:6px; height:6px;
  background:var(--c); border-radius:50%; transform:translateX(-50%);
  box-shadow:0 0 12px var(--c);
}
@keyframes ring-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.avatar-ring2 {
  position:absolute; inset:-14px; border-radius:50%;
  border:1px solid rgba(0,212,232,0.12);
  animation:ring-spin 12s linear infinite reverse;
}
.avatar-core {
  width:88px; height:88px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%, rgba(0,212,232,0.25), rgba(0,212,232,0.05) 60%);
  border:1px solid rgba(0,212,232,0.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:var(--c);
  box-shadow:0 0 40px rgba(0,212,232,0.2), inset 0 0 30px rgba(0,212,232,0.08);
  position:relative; z-index:1;
}

.id-info { position:relative; z-index:1; }
.id-name {
  font-family:'Orbitron',monospace; font-size:28px; font-weight:900;
  color:#fff; letter-spacing:0.05em; margin-bottom:6px;
  text-shadow:0 0 40px rgba(0,212,232,0.3);
}
.id-addr {
  font-family:'Space Mono',monospace; font-size:9px; color:var(--txt2);
  margin-bottom:12px; letter-spacing:0.05em;
}
.id-badges { display:flex; gap:8px; flex-wrap:wrap; }
.id-badge {
  display:inline-flex; align-items:center; gap:6px; padding:5px 12px;
  background:rgba(0,212,232,0.06); border:1px solid rgba(0,212,232,0.2);
  border-radius:100px;
  font-family:'Space Mono',monospace; font-size:8px; color:var(--c); letter-spacing:0.08em;
}
.id-badge-dot { width:5px; height:5px; border-radius:50%; background:var(--c); animation:pulse 1.8s infinite; box-shadow:0 0 6px var(--c); }
.id-badge.gold { color:var(--gold); background:rgba(245,158,11,0.06); border-color:rgba(245,158,11,0.2); }
.id-badge.gold .id-badge-dot { background:var(--gold); box-shadow:0 0 6px var(--gold); }

.id-score-display { position:relative; z-index:1; text-align:center; }
.score-ring-wrap { position:relative; display:inline-block; }
.score-ring-wrap canvas { display:block; }
.score-number {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.score-val {
  font-family:'Orbitron',monospace; font-size:42px; font-weight:900;
  color:var(--c); line-height:1;
  text-shadow:0 0 30px rgba(0,212,232,0.5);
}
.score-lbl {
  font-family:'Space Mono',monospace; font-size:7px; color:var(--txt2);
  letter-spacing:0.15em; text-transform:uppercase; margin-top:2px;
}

/* ── METRIC GRID ── */
.metrics-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px;
}
.metric-card {
  position:relative; padding:20px; overflow:hidden;
  background:var(--glass2); border:1px solid rgba(255,255,255,0.06);
  border-radius:10px; cursor:default; transition:all 0.35s var(--ease);
}
.metric-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}
.metric-card:hover {
  border-color:var(--border2); transform:translateY(-3px);
  background:rgba(0,212,232,0.04);
  box-shadow:0 16px 48px rgba(0,0,0,0.5), 0 0 30px rgba(0,212,232,0.06);
}
.metric-card .accent-line {
  position:absolute; top:0; left:0; bottom:0; width:2px; border-radius:0 2px 2px 0;
}
.mc-label {
  font-family:'Space Mono',monospace; font-size:7px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--txt2); margin-bottom:10px; padding-left:14px;
}
.mc-value {
  font-family:'Orbitron',monospace; font-size:32px; font-weight:900;
  line-height:1; margin-bottom:8px; padding-left:14px;
}
.mc-badge {
  display:inline-flex; align-items:center; gap:5px; padding:3px 10px; margin-left:14px;
  border-radius:100px; font-family:'Space Mono',monospace; font-size:7px;
  letter-spacing:0.08em;
}

/* ── LIVE DATA CARDS ── */
.live-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.live-card {
  padding:22px; border-radius:10px; position:relative; overflow:hidden;
  background:var(--glass2); border:1px solid rgba(255,255,255,0.06);
  transition:all 0.3s; cursor:default;
}
.live-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}
.live-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.live-label {
  display:flex; align-items:center; gap:7px; margin-bottom:12px;
  font-family:'Space Mono',monospace; font-size:7px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--txt2);
}
.live-dot {
  width:5px; height:5px; border-radius:50%; animation:pulse 1.5s infinite;
}
.live-value {
  font-family:'Orbitron',monospace; font-size:28px; font-weight:700;
  line-height:1; margin-bottom:6px; transition:color 0.5s;
}
.live-sub { font-size:10px; color:var(--txt2); }

/* ── TWO-COL GRID ── */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:14px; }

.panel {
  padding:22px; border-radius:10px; position:relative; overflow:hidden;
  background:var(--glass2); border:1px solid rgba(255,255,255,0.06);
}
.panel::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}
.panel-title {
  font-family:'Space Mono',monospace; font-size:7.5px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--txt2); margin-bottom:16px;
  display:flex; align-items:center; justify-content:space-between;
}
.live-badge {
  display:inline-flex; align-items:center; gap:5px; padding:3px 9px;
  background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2);
  border-radius:100px; font-family:'Space Mono',monospace; font-size:6px;
  color:var(--green); letter-spacing:0.1em;
}
.live-badge::before {
  content:''; width:4px; height:4px; border-radius:50%; background:var(--green);
  animation:pulse 1.5s infinite; box-shadow:0 0 6px var(--green);
}

/* Activity bars */
.activity-bars { display:flex; align-items:flex-end; gap:3px; height:70px; }
.a-bar {
  flex:1; border-radius:2px 2px 0 0; cursor:default;
  transition:opacity 0.2s, transform 0.2s;
  background:linear-gradient(to top, var(--c), rgba(0,212,232,0.3));
  opacity:0.2;
}
.a-bar:hover { opacity:0.9; transform:scaleY(1.08); transform-origin:bottom; }
.months {
  display:flex; justify-content:space-between; margin-top:8px;
  font-family:'Space Mono',monospace; font-size:6.5px; color:var(--txt2);
}

/* Chain pills */
.chain-pills { display:flex; flex-wrap:wrap; gap:7px; }
.chain-pill {
  display:flex; align-items:center; gap:6px; padding:6px 12px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  border-radius:100px; font-size:11px; color:var(--txt);
  transition:all 0.2s; cursor:default;
}
.chain-pill:hover { border-color:var(--border2); background:rgba(0,212,232,0.05); }
.cpill-dot { width:6px; height:6px; border-radius:50%; }

/* Risk rows */
.risk-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:11px;
}
.risk-item:last-child { border-bottom:none; }
.risk-label { color:var(--txt2); }
.risk-ok {
  display:inline-flex; align-items:center; gap:5px; padding:3px 10px;
  background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2);
  border-radius:100px; font-family:'Space Mono',monospace; font-size:7px; color:var(--green);
}

/* History */
.hist-item {
  display:flex; align-items:center; gap:10px; padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.hist-item:last-child { border-bottom:none; }
.hist-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.hist-text { font-size:11px; color:var(--txt); }
.hist-year { font-family:'Space Mono',monospace; font-size:7.5px; color:var(--txt2); margin-left:auto; }

/* Market rows */
.mkt-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:11px;
}
.mkt-item:last-child { border-bottom:none; }
.mkt-sym { display:flex; align-items:center; gap:8px; }
.mkt-dot { width:6px; height:6px; border-radius:50%; }
.mkt-price { text-align:right; }
.mkt-price div:first-child { color:var(--txt); font-family:'Space Mono',monospace; font-size:9px; }
.mkt-chg { font-family:'Space Mono',monospace; font-size:7.5px; }
.up { color:var(--green); } .dn { color:var(--red); }

/* ── SBAR ── */
#sbar {
  position:fixed; bottom:0; left:0; right:0; height:52px; z-index:100;
  background:rgba(2,4,8,0.9); backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,212,232,0.1);
  display:flex; align-items:center; padding:0 24px; gap:16px;
}
.sb-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
.sb-addr { font-family:'Space Mono',monospace; font-size:9px; color:var(--c); }
.sb-sep { width:1px; height:18px; background:rgba(255,255,255,0.1); }
.sb-chain { font-family:'Space Mono',monospace; font-size:9px; color:var(--txt2); }
.sb-disc {
  margin-left:auto; padding:6px 14px; background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.2); border-radius:6px; color:rgba(239,68,68,0.8);
  font-family:'Space Mono',monospace; font-size:8px; cursor:pointer; letter-spacing:0.08em;
  transition:all 0.2s; text-transform:uppercase;
}
.sb-disc:hover { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.4); }

/* ── REVEAL ANIMATIONS ── */
.rv { opacity:0; transform:translateY(18px); transition:opacity 0.7s var(--ease), transform 0.7s var(--ease); }
.rv.in { opacity:1; transform:translateY(0); }

@media(max-width:768px) {
  .metrics-grid { grid-template-columns:1fr 1fr; }
  .live-grid { grid-template-columns:1fr 1fr; }
  .two-col, .three-col { grid-template-columns:1fr; }
  .id-hero { grid-template-columns:1fr; text-align:center; }
  .inner { padding:20px 16px 100px; }
}
</style>
</head>

<script>
/* ── SCORE RING ── */
function drawScoreRing(canvas, score, max) {
  var dpr = window.devicePixelRatio || 1;
  var size = 130;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var cx = size/2, cy = size/2, r = 50;
  
  // Background track
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,212,232,0.1)'; ctx.lineWidth = 5; ctx.stroke();
  
  // Gradient arc
  var grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#00d4e8'); grad.addColorStop(1, '#7c3aff');
  var angle = (score / max) * Math.PI * 2 - Math.PI/2;
  ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI/2, angle);
  ctx.strokeStyle = grad; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
  
  // Glow
  ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI/2, angle);
  ctx.strokeStyle = 'rgba(0,212,232,0.3)'; ctx.lineWidth = 10; ctx.lineCap = 'round';
  ctx.globalAlpha = 0.4; ctx.stroke(); ctx.globalAlpha = 1;
}

function animNum(id, from, to, dur) {
  var el = document.getElementById(id); if (!el) return;
  var s = performance.now();
  function u(now) {
    var p = Math.min((now-s)/dur, 1), e = 1 - Math.pow(1-p, 3.5);
    el.textContent = Math.round(from + (to-from)*e);
    if (p < 1) requestAnimationFrame(u);
  }
  requestAnimationFrame(u);
}

function fmtNum(n, d) { return n.toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d}); }
function fmtP(p) { return p > 10000 ? '$' + Math.round(p).toLocaleString() : p > 1 ? '$' + p.toFixed(2) : '$' + p.toFixed(4); }

var ethPrice = 3482, gasPrice = 18;
var tokenData = {
  ethereum: {price:3482, chg:2.34},
  bitcoin: {price:104221, chg:1.87},
  solana: {price:182.40, chg:4.12},
  'matic-network': {price:0.892, chg:-0.84}
};

var connAddr = null, connWallet = null, chainId = '0x1';
var idLiveInterval = null;

    [34,56,24,82,48,70,88,40,66,52,76,44].forEach(function(v) {

function updateIdLive() {
  if (!connAddr) return;
  if (ethPrice) {
    var usd = '≈ $' + fmtNum(3.2841 * ethPrice, 2) + ' USD';
    ['id-usd','id-usd2'].forEach(function(id) { var e=document.getElementById(id); if(e) e.textContent=usd; });
  }
  if (gasPrice) {
    var gv=document.getElementById('id-gas-val'), g2=document.getElementById('id-gas-2');
    if (gv) gv.textContent = gasPrice;
    if (g2) g2.textContent = gasPrice + ' gwei';
    var gu = document.getElementById('id-gas-usd');
    if (gu && ethPrice) gu.textContent = '~$' + ((gasPrice*21000/1e9)*ethPrice).toFixed(3);
  }
  var tp = document.getElementById('id-tps');
  if (tp) tp.textContent = (Math.random()*8+12).toFixed(1) + ' TPS';
  buildMkt();
}

function buildMkt() {
  var ml = document.getElementById('id-mkt'); if (!ml) return;
  var coins = [
    {sym:'ETH',id:'ethereum',col:'#6f7cff'},
    {sym:'BTC',id:'bitcoin',col:'#f7931a'},
    {sym:'SOL',id:'solana',col:'#ab73ff'},
    {sym:'MATIC',id:'matic-network',col:'#8247e5'}
  ];
  var now = new Date(), ts = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  var tsel = document.getElementById('id-mkt-ts'); if (tsel) tsel.textContent = ts;
  ml.innerHTML = coins.map(function(c) {
    var d = tokenData[c.id]||{}, p = d.price||0, chg = d.chg||0, up = chg>=0;
    return '<div class="mkt-item">' +
      '<div class="mkt-sym"><div class="mkt-dot" style="background:'+c.col+'"></div><span style="font-size:12px;color:#fff">'+c.sym+'</span></div>' +
      '<div class="mkt-price">' +
        '<div>'+(p?fmtP(p):'—')+'</div>' +
        '<div class="mkt-chg '+(up?'up':'dn')+'">'+(p?(up?'+':'')+chg.toFixed(2)+'%':'—')+'</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// Fetch live prices
function fetchPrices() {
  fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum,bitcoin,solana,matic-network&vs_currencies=usd&include_24hr_change=true')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ethereum) { ethPrice = d.ethereum.usd; tokenData.ethereum = {price:d.ethereum.usd, chg:d.ethereum.usd_24h_change||0}; }
      if (d.bitcoin) tokenData.bitcoin = {price:d.bitcoin.usd, chg:d.bitcoin.usd_24h_change||0};
      if (d.solana) tokenData.solana = {price:d.solana.usd, chg:d.solana.usd_24h_change||0};
      if (d['matic-network']) tokenData['matic-network'] = {price:d['matic-network'].usd, chg:d['matic-network'].usd_24h_change||0};
      updateIdLive();
    }).catch(function() {});
}

function openWallet() {}
function chainShort(id) {
  var m = {'0x1':'ETH','0xaa36a7':'SEP','0x89':'MATIC','0xa4b1':'ARB','0xa':'OP','0x2105':'BASE'};
  return m[id] || 'ETH';
}
function chainLabel(id) {
  var m = {'0x1':'Ethereum Mainnet','0xaa36a7':'Sepolia Testnet','0x89':'Polygon','0xa4b1':'Arbitrum One','0xa':'Optimism','0x2105':'Base'};
  return m[id] || 'Ethereum';
}

// MetaMask integration
function initWallet() {
  if (typeof window.ethereum === 'undefined') {
    connAddr = '0xDEMO...0001'; connWallet = 'Demo Mode'; chainId = '0x1';
    updateSbar(); buildIdentity(); return;
  }
  window.ethereum.request({method:'eth_accounts'}).then(function(accs) {
    if (accs.length > 0) {
      connAddr = accs[0]; connWallet = 'MetaMask';
      window.ethereum.request({method:'eth_chainId'}).then(function(id) { chainId = id; updateSbar(); buildIdentity(); });
    } else { buildIdentity(); }
  });
  document.getElementById('navBtn').addEventListener('click', function() {
    window.ethereum.request({method:'eth_requestAccounts'}).then(function(accs) {
      if (accs.length > 0) {
        connAddr = accs[0]; connWallet = 'MetaMask';
        window.ethereum.request({method:'eth_chainId'}).then(function(id) { chainId = id; updateSbar(); buildIdentity(); });
      }
    });
  });
}

function updateSbar() {
  if (!connAddr) return;
  document.getElementById('sbAddr').textContent = connAddr.slice(0,6) + '...' + connAddr.slice(-4);
  document.getElementById('sbChain').textContent = chainLabel(chainId);
  document.getElementById('navLbl').textContent = connAddr.slice(0,6) + '...' + connAddr.slice(-4);
  document.getElementById('discBtn').onclick = function() {
    connAddr = null; connWallet = null;
    document.getElementById('navLbl').textContent = 'Connect Wallet';
    buildIdentity();
  };
}

document.addEventListener('DOMContentLoaded', function() {
  initWallet();
  fetchPrices();
  setInterval(fetchPrices, 30000);
  // Gas price simulation
  setInterval(function() {
    gasPrice = Math.floor(Math.random()*30 + 8);
    updateIdLive();
  }, 15000);
  // Staking counter
  setInterval(function() {
    stakeEarned += 0.00000042;
    var el = document.getElementById('stakeReward');
    if (el) el.textContent = stakeEarned.toFixed(7);
  }, 900);
});
</script>
