<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIALO — Infrastructure</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Orbitron:wght@400;600;700;900&family=Bebas+Neue&family=DM+Sans:ital,wght@0,200;0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --c:#00d4e8; --c2:#7c3aff; --gold:#f59e0b; --green:#10b981; --red:#ef4444;
  --blue:#6ba3ff; --bg:#020408; --glass:rgba(0,212,232,0.04); --glass2:rgba(255,255,255,0.02);
  --border:rgba(0,212,232,0.12); --border2:rgba(0,212,232,0.22);
  --txt:rgba(255,255,255,0.85); --txt2:rgba(255,255,255,0.4); --nav-h:64px;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{cursor:none !important;}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;
}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 800px 600px at 20% 40%,rgba(0,212,232,.05) 0%,transparent 70%),
    radial-gradient(ellipse 600px 700px at 80% 60%,rgba(124,58,255,.05) 0%,transparent 70%);
}
.grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,212,232,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,232,.04) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
}
#BG{position:fixed;inset:0;z-index:1;pointer-events:none;}
#CUR{
  position:fixed;z-index:9999;pointer-events:none;
  width:10px;height:10px;border-radius:50%;
  background:var(--c);
  box-shadow:0 0 14px var(--c),0 0 28px rgba(0,212,232,.4);
  transform:translate(-50%,-50%);
  transition:width .18s var(--ease),height .18s var(--ease),background .18s,opacity .2s;
}
#CUR2{
  position:fixed;z-index:9998;pointer-events:none;
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(0,212,232,.35);
  transform:translate(-50%,-50%);
  transition:transform .07s linear,width .22s var(--ease),height .22s var(--ease),border-color .3s,opacity .2s;
}
#CUR.link{width:22px;height:22px;background:rgba(0,212,232,.15);}
#CUR2.link{width:52px;height:52px;border-color:rgba(0,212,232,.7);}
#CUR.click{transform:translate(-50%,-50%) scale(.6);}
#CUR2.click{transform:translate(-50%,-50%) scale(.85);}
#flash{
  position:fixed;inset:0;z-index:9990;pointer-events:none;
  background:radial-gradient(circle 120px at var(--fx,50%) var(--fy,50%),rgba(0,212,232,.07),transparent);
  opacity:0;transition:opacity .4s;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;
  display:flex;align-items:center;padding:0 32px;gap:40px;
  background:rgba(2,4,8,.85);backdrop-filter:blur(32px);
  border-bottom:1px solid rgba(0,212,232,.08);
}
nav::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),rgba(124,58,255,.8),transparent);
}
.logo{
  font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#fff;
  text-decoration:none;letter-spacing:.15em;display:flex;align-items:center;gap:10px;
}
.logo-dot{
  width:8px;height:8px;border-radius:50%;background:var(--c);
  box-shadow:0 0 12px var(--c),0 0 24px rgba(0,212,232,.4);
  animation:logopulse 2s ease infinite;
}
@keyframes logopulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.nav-links{display:flex;gap:6px;flex:1;justify-content:center;}
.nav-links a{
  padding:7px 14px;font-size:11px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--txt2);text-decoration:none;
  border-radius:4px;transition:all .2s;position:relative;
}
.nav-links a:hover{color:var(--txt);background:rgba(255,255,255,.04);}
.nav-links a.active{
  color:var(--c);background:rgba(0,212,232,.08);
  border:1px solid rgba(0,212,232,.18);
}
.nav-links a.active::after{
  content:'';position:absolute;bottom:-1px;left:20%;right:20%;
  height:1px;background:var(--c);box-shadow:0 0 8px var(--c);
}
.nav-right{display:flex;align-items:center;gap:10px;}
.chain-badge{
  display:flex;align-items:center;gap:7px;padding:6px 14px;
  background:rgba(0,212,232,.06);border:1px solid var(--border);border-radius:6px;
  font-family:'Space Mono',monospace;font-size:9px;color:var(--c);
}
.chain-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-connect{
  padding:9px 20px;background:var(--c);color:#000;border:none;border-radius:6px;
  font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;
  cursor:none;transition:all .2s;text-transform:uppercase;
  box-shadow:0 0 20px rgba(0,212,232,.3);
}
.btn-connect:hover{box-shadow:0 0 32px rgba(0,212,232,.5);transform:translateY(-1px);}

/* LAYOUT */
.infra-page{position:relative;z-index:10;margin-top:var(--nav-h);}
.infra-inner{max-width:1100px;margin:0 auto;padding:40px 28px 120px;}

/* TX LOADING OVERLAY */
#tx-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(2,4,8,.92);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#tx-overlay.show{opacity:1;pointer-events:auto;}
.tx-spinner{
  width:56px;height:56px;border-radius:50%;
  border:3px solid rgba(0,212,232,.15);
  border-top-color:var(--c);
  animation:spin 1s linear infinite;
  box-shadow:0 0 24px rgba(0,212,232,.3);
}
@keyframes spin{to{transform:rotate(360deg)}}
.tx-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#fff;}
.tx-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt2);text-align:center;line-height:2;}
.tx-hash-link{
  font-family:'Space Mono',monospace;font-size:8px;color:var(--c);
  text-decoration:none;padding:6px 14px;border:1px solid rgba(0,212,232,.2);
  border-radius:6px;background:rgba(0,212,232,.05);display:none;
}
.tx-hash-link.show{display:inline-flex;}

/* SUCCESS OVERLAY */
.success-overlay{
  position:absolute;inset:0;z-index:20;border-radius:10px;
  background:rgba(2,4,8,.95);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  opacity:0;pointer-events:none;transition:opacity .4s var(--ease);
  backdrop-filter:blur(12px);
}
.success-overlay.show{opacity:1;pointer-events:auto;}
.success-ico{font-size:40px;animation:successPop .5s var(--ease);}
@keyframes successPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--green);}
.success-detail{font-family:'Space Mono',monospace;font-size:8px;color:var(--txt2);text-align:center;line-height:1.8;}
.success-bal{
  padding:8px 20px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
  border-radius:6px;font-family:'Orbitron',monospace;font-size:14px;color:var(--green);
}
.success-txhash{
  font-family:'Space Mono',monospace;font-size:7px;color:var(--c);
  text-decoration:none;padding:5px 12px;border:1px solid rgba(0,212,232,.2);
  border-radius:5px;background:rgba(0,212,232,.05);
}
.success-close{
  margin-top:6px;padding:8px 24px;background:none;border:1px solid rgba(255,255,255,.12);
  border-radius:6px;color:var(--txt2);font-family:'Space Mono',monospace;font-size:7px;
  cursor:none;transition:all .2s;letter-spacing:.1em;
}
.success-close:hover{border-color:var(--border2);color:#fff;}

/* TYPOGRAPHY */
.sec-eyebrow{
  font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--c);opacity:.7;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.sec-eyebrow::before{content:'';width:14px;height:1px;background:var(--c);}
.sec-heading{
  font-family:'Orbitron',monospace;font-size:clamp(26px,3.5vw,42px);
  font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:.03em;line-height:1.15;
}
.sec-desc{font-size:12px;color:var(--txt2);max-width:480px;line-height:2;
