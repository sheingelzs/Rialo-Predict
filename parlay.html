<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RIALO — Ultra Real-Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050810; --card: #0f172a; --accent: #4ade80; --red: #f87171; }
        body { background: var(--bg); color: white; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .price { font-family: monospace; font-size: 1.3rem; color: var(--accent); font-weight: bold; display: block; min-width: 150px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .offline { background: var(--red); }
        button { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.active-up { background: var(--accent); color: black; }
        button.active-down { background: var(--red); color: white; }
        .vs-bar { background: #1e293b; height: 8px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .vs-fill { background: var(--accent); height: 100%; width: 50%; transition: 0.3s; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
        <h2 style="font-family: 'Syne'; margin:0;">Rialo Crypto Parlay</h2>
        <div id="connection-status" style="font-size: 0.8rem; color: #64748b;">
            <span class="status-dot offline" id="dot"></span> <span id="status-text">Connecting to Market...</span>
        </div>
    </div>

    <div class="container">
        <div>
            <div class="card">
                <div>
                    <div style="font-weight: bold;">BITCOIN (BTC)</div>
                    <span class="price" id="p-btc">00,000.00</span>
                    <span id="c-btc" style="font-size: 0.8rem;">0.00%</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="btc-up" onclick="pick('btc','UP')">UP</button>
                    <button id="btc-down" onclick="pick('btc','DOWN')">DOWN</button>
                </div>
            </div>

            <div class="card">
                <div>
                    <div style="font-weight: bold;">ETHEREUM (ETH)</div>
                    <span class="price" id="p-eth">0,000.00</span>
                    <span id="c-eth" style="font-size: 0.8rem;">0.00%</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="eth-up" onclick="pick('eth','UP')">UP</button>
                    <button id="eth-down" onclick="pick('eth','DOWN')">DOWN</button>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <div style="font-size: 0.7rem; color: #64748b; margin-bottom: 5px;">VERSUS MARKET: BTC vs ETH</div>
                <div class="vs-bar"><div id="vs-btc-eth" class="vs-fill"></div></div>
            </div>
        </div>

        <div style="background: #0b1120; padding: 20px; border-radius: 12px; border: 1px solid #1e293b; height: fit-content;">
            <h3 style="margin-top:0;">Bet Slip</h3>
            <div id="slip-items" style="font-size: 0.9rem; color: #64748b;">Pilih UP/DOWN</div>
            <hr style="border: 0; border-top: 1px solid #1e293b; margin: 15px 0;">
            <button style="width:100%; background: var(--accent); color: black; border:none; padding:12px; border-radius:8px;">Place Parlay</button>
        </div>
    </div>

<script>
    let prices = { btc: 0, eth: 0 };
    let changes = { btc: 0, eth: 0 };
    let selections = {};

    function connect() {
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker/ethusdt@ticker');
        
        ws.onopen = () => {
            document.getElementById('dot').className = 'status-dot online';
            document.getElementById('status-text').innerText = 'Market Live (Binance)';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const coin = data.s.replace('USDT', '').toLowerCase();
            const price = parseFloat(data.c);
            const change = parseFloat(data.P);

            prices[coin] = price;
            changes[coin] = change;

            // Update Price & Change
            const pEl = document.getElementById(`p-${coin}`);
            const cEl = document.getElementById(`c-${coin}`);
            
            if(pEl) pEl.innerText = `$${price.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            if(cEl) {
                cEl.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                cEl.style.color = change >= 0 ? 'var(--accent)' : 'var(--red)';
            }

            // Update Versus Bar (BTC vs ETH)
            const vsBar = document.getElementById('vs-btc-eth');
            if(prices.btc && prices.eth) {
                const ratio = 50 + ((changes.btc - changes.eth) * 3); // Penguat visual
                vsBar.style.width = `${Math.max(10, Math.min(90, ratio))}%`;
            }
        };

        ws.onclose = () => {
            document.getElementById('dot').className = 'status-dot offline';
            document.getElementById('status-text').innerText = 'Connection Lost. Reconnecting...';
            setTimeout(connect, 3000); // Coba lagi dalam 3 detik
        };
    }

    function pick(coin, dir) {
        if(selections[coin] === dir) delete selections[coin];
        else selections[coin] = dir;

        // Update Buttons
        ['btc', 'eth'].forEach(c => {
            document.getElementById(`${c}-up`).className = selections[c] === 'UP' ? 'active-up' : '';
            document.getElementById(`${c}-down`).className = selections[c] === 'DOWN' ? 'active-down' : '';
        });

        // Update Slip
        const slip = document.getElementById('slip-items');
        const keys = Object.keys(selections);
        slip.innerHTML = keys.length ? keys.map(k => `<div>${k.toUpperCase()}: <b>${selections[k]}</b></div>`).join('') : 'Pilih UP/DOWN';
    }

    connect(); // Jalankan koneksi
</script>
</body>
</html>
