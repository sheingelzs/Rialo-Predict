<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO - Predict & Win</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050810;
  --card: #0f1929;
  --border: #1a2a42;
  --accent: #4ade80;
  --red: #f87171;
  --text: #e8eaf0;
  --font: 'Space Grotesk', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}

/* NAV - TANPA HOME & MARKET */
.nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100;background:rgba(5,8,16,0.95);backdrop-filter:blur(12px);}
.nav-logo{font-family: 'Syne', sans-serif;font-size:1.25rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer;}
.logo-dot{width:9px;height:9px;background:var(--accent);border-radius:50%;}
.nav-tabs{display:flex;gap:0.2rem;background:rgba(255,255,255,0.05);border-radius:9px;padding:3px;}
.nav-tab{padding:0.35rem 0.85rem;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,0.45);font-size:0.78rem;font-weight:600;cursor:pointer;}
.nav-tab.active{background:rgba(255,255,255,0.1);color:#fff;}

.page{display:none;animation:fadeIn 0.2s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* MENU PAGE */
.menu-page{padding:2.5rem 1.5rem;max-width:580px;margin:0 auto;}
.menu-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:1.35rem;cursor:pointer;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;transition:0.2s;}
.menu-card:hover{background:rgba(255,255,255,0.07);border-color:var(--accent);}
.social-link{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 0.9rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:9px;color:rgba(255,255,255,0.65);text-decoration:none;margin-bottom:0.5rem;}
.social-link:hover{background:rgba(255,255,255,0.07);color:#fff;}

/* PARLAY STYLE (Sesuai yang lo suka) */
.parlay-page{padding:1.5rem;display:grid;grid-template-columns:1fr 320px;gap:1.25rem;max-width:1000px;margin:0 auto;}
.predict-row{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1rem;margin-bottom:0.5rem;}
.up-btn,.dn-btn{padding:0.4rem 0.8rem;border-radius:6px;border:none;font-weight:700;cursor:pointer;margin-left:5px;}
.up-btn{background:rgba(74,222,128,0.1);color:var(--accent);}
.dn-btn{background:rgba(248,113,113,0.1);color:var(--red);}
.up-btn.selected{background:var(--accent);color:#000;}
.dn-btn.selected{background:var(--red);color:#fff;}

@media(max-width:800px){ .parlay-page{grid-template-columns:1fr;} }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo" onclick="showPage('menu')">
    <div class="logo-dot"></div>RIALO
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('menu')">Menu</button>
    <button class="nav-tab" onclick="showPage('parlay')">Parlay</button>
  </div>
  <button id="nav-wallet-btn" style="background:none;border:1px solid var(--accent);color:var(--accent);padding:5px 12px;border-radius:8px;font-size:0.75rem;cursor:pointer;">Connect</button>
</nav>

<div class="page active" id="page-menu">
  <div class="menu-page">
    <h2 style="font-family:'Syne';margin-bottom:1rem;">Dashboard</h2>
    <div class="menu-card" onclick="showPage('parlay')">
      <div style="font-size:1.5rem;">🎯</div>
      <div>
        <div style="font-weight:700;">Start Parlay</div>
        <div style="font-size:0.75rem;color:gray;">Predict crypto moves & multiply rewards</div>
      </div>
    </div>

    <h3 style="font-size:0.7rem;text-transform:uppercase;color:gray;margin:2rem 0 0.7rem;">Community & Socials</h3>
    <div class="social-links">
      <a class="social-link" href="https://x.com/rialohq" target="_blank">
        <span>𝕏</span> <div><b>Rialo HQ</b> <br><small>@rialohq</small></div>
      </a>
      <a class="social-link" href="https://discord.gg/rialoprotocol" target="_blank">
        <span>👾</span> <div><b>Discord</b> <br><small>Join Community</small></div>
      </a>
    </div>
  </div>
</div>

<div class="page" id="page-parlay">
  <div class="parlay-page">
    <div class="parlay-left">
      <h2 style="font-family:'Syne';margin-bottom:1rem;">Live Parlay</h2>
      <div class="predict-row">
        <div style="flex:1;"><b>BTC</b> <br><small>$92,450</small></div>
        <button class="up-btn" onclick="this.classList.toggle('selected')">▲ UP</button>
        <button class="dn-btn" onclick="this.classList.toggle('selected')">▼ DOWN</button>
      </div>
      <div class="predict-row">
        <div style="flex:1;"><b>ETH</b> <br><small>$2,410</small></div>
        <button class="up-btn" onclick="this.classList.toggle('selected')">▲ UP</button>
        <button class="dn-btn" onclick="this.classList.toggle('selected')">▼ DOWN</button>
      </div>
      <div class="predict-row">
        <div style="flex:1;"><b>SOL</b> <br><small>$145.20</small></div>
        <button class="up-btn" onclick="this.classList.toggle('selected')">▲ UP</button>
        <button class="dn-btn" onclick="this.classList.toggle('selected')">▼ DOWN</button>
      </div>
    </div>

    <div class="parlay-right">
        <div style="background:rgba(255,255,255,0.03);padding:1.5rem;border-radius:14px;border:1px solid var(--border);">
            <h4 style="font-size:0.8rem;margin-bottom:1rem;">Bet Slip</h4>
            <div style="color:gray;font-size:0.75rem;text-align:center;padding:2rem 0;">Select picks to start</div>
            <button style="width:100%;background:var(--accent);border:none;padding:10px;border-radius:8px;font-weight:700;cursor:pointer;opacity:0.5;">Place Bet</button>
        </div>
    </div>
  </div>
</div>

<script>
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  
  // Update tab highlight
  const tabs = document.querySelectorAll('.nav-tab');
  if(id === 'menu') tabs[0].classList.add('active');
  if(id === 'parlay') tabs[1].classList.add('active');
}
</script>

</body>
</html>
