<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO — Live Real-Time Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#050810; --bg2:#0b1120; --card:#0f1929; --border:#1a2a42;
  --accent:#4ade80; --accent2:#7c5cfc; --red:#f87171; --text:#e8eaf0; --muted:#5a7090;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Space Grotesk', sans-serif; overflow-x:hidden; }

/* ── BG CANVAS ── */
#net-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4; }

/* ── NAV ── */
.nav { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:100; background:rgba(5,8,16,0.92); backdrop-filter:blur(16px); }
.nav-logo { font-family:'Syne', sans-serif; font-size:1.2rem; font-weight:800; cursor:pointer; display:flex; align-items:center; gap:8px; }
.logo-dot { width:10px; height:10px; background:var(--accent); border-radius:50%; box-shadow: 0 0 10px var(--accent); }
.nav-tabs { display:flex; gap:10px; }
.nav-tab { background:transparent; border:none; color:var(--muted); cursor:pointer; font-weight:600; font-size:0.85rem; padding:5px 10px; transition: 0.2s; }
.nav-tab.active { color:var(--accent); }
.wallet-btn { padding:0.5rem 1rem; border-radius:8px; border:1px solid var(--accent); color:var(--accent); background:rgba(74,222,128,0.1); cursor:pointer; font-weight:700; font-size:0.75rem; }

/* ── PAGE LAYOUT ── */
.page { display:none; position:relative; z-index:1; padding:2rem 1.5rem; max-width:1100px; margin:0 auto; }
.page.active { display:block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ── PARLAY BUILDER ── */
.parlay-container { display:grid; grid-template-columns: 1fr 340px; gap:2rem; }
@media (max-width: 850px) { .parlay-container { grid-template-columns: 1fr; } }

.market-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.2rem; margin-bottom:1rem; display:flex; align-items:center; justify-content:space-between; transition: 0.2s; }
.coin-info { display:flex; align-items:center; gap:12px; }
.coin-icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; background:rgba(255,255,255,0.05); }
.coin-name { font-weight:700; font-size:1rem; }
.coin-price { font-family:monospace; font-size:1.1rem; color:var(--accent); margin-top:2px; min-width: 120px; }

.btn-group { display:flex; gap:8px; }
.btn-pick { padding:0.6rem 1.2rem; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:var(--text); cursor:pointer; font-weight:700; transition:0.2s; }
.btn-pick.up:hover, .btn-pick.up.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }
.btn-pick.down:hover, .btn-pick.down.active { background:var(--red); color:#fff; border-color:var(--red); }

/* ── BET SLIP ── */
.bet-slip { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; height:fit-content; position:sticky; top:100px; }
.slip-title { font-family:'Syne', sans-serif; margin-bottom:1rem; display:flex; justify-content:space-between; }
.slip-item { background:rgba(255,255,255,0.03); padding:0.8rem; border-radius:8px; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center; font-size:0.9rem; border-left: 4px solid var(--accent2); }
.mult-box { margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border); }
.row-between { display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem; }
.big-val { font-weight:800; color:var(--accent); font-size:1.2rem; }
.place-btn { width:100%; padding:1rem; border-radius:10px; border:none; background:var(--accent2); color:#fff; font-weight:800; cursor:pointer; margin-top:1rem; transition:0.2s; }
.place-btn:disabled { opacity:0.3; cursor:not-allowed; }
</style>
</head>
<body>

<canvas id="net-canvas"></canvas>

<nav class="nav">
  <div class="nav-logo" onclick="location.reload()"><div class="logo-dot"></div> RIALO</div>
  <div class="nav-tabs">
    <button class="nav-tab active">Parlay</button>
    <button class="nav-tab">History</button>
  </div>
  <button class="wallet-btn" id="wallet-btn" onclick="connectWallet()">Connect Wallet</button>
</nav>

<div class="page active">
  <div class="parlay-container">
    
    <div class="markets-list">
      <h2 style="margin-bottom:1.5rem; font-family:'Syne';">Live Prediction</h2>
      
      <div class="market-card">
        <div class="coin-info">
          <div class="coin-icon" style="color:#f7931a">₿</div>
          <div>
            <div class="coin-name">Bitcoin</div>
            <div class="coin-price" id="price-btc">Connecting...</div>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn-pick up" onclick="togglePick('BTC', 'UP')">UP</button>
          <button class="btn-pick down" onclick="togglePick('BTC', 'DOWN')">DOWN</button>
        </div>
      </div>

      <div class="market-card">
        <div class="coin-info">
          <div class="coin-icon" style="color:#627eea">Ξ</div>
          <div>
            <div class="coin-name">Ethereum</div>
            <div class="coin-price" id="price-eth">Connecting...</div>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn-pick up" onclick="togglePick('ETH', 'UP')">UP</button>
          <button class="btn-pick down" onclick="togglePick('ETH', 'DOWN')">DOWN</button>
        </div>
      </div>

      <div class="market-card">
        <div class="coin-info">
          <div class="coin-icon" style="color:#14f195">S</div>
          <div>
            <div class="coin-name">Solana</div>
            <div class="coin-price" id="price-sol">Connecting...</div>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn-pick up" onclick="togglePick('SOL', 'UP')">UP</button>
          <button class="btn-pick down" onclick="togglePick('SOL', 'DOWN')">DOWN</button>
        </div>
      </div>
    </div>

    <div class="bet-slip">
      <div class="slip-title">
        <span>Parlay Builder</span>
        <span id="count-tag" style="color:var(--muted); font-size:0.8rem;">0 Picks</span>
      </div>
      
      <div id="slip-container">
        <p style="color:var(--muted); font-size:0.8rem; text-align:center; padding:20px 0;">Select a direction to start</p>
      </div>

      <div class="mult-box">
        <div class="row-between">
          <span>Multiplier</span>
          <span class="big-val" id="mult-val">1.00x</span>
        </div>
        <div class="row-between">
          <span>Potential Payout</span>
          <span id="payout-val">0 Points</span>
        </div>
        <button class="place-btn" id="place-btn" disabled onclick="submitBet()">Place Prediction</button>
      </div>
    </div>

  </div>
</div>

<script>
let parlay = [];
let isConnected = false;

// ── WEBSOCKET BINANCE (REAL-TIME) ──
const symbols = ['btcusdt', 'ethusdt', 'solusdt'];
const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbols.map(s => `${s}@ticker`).join('/')}`);

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    const coin = data.s.replace('USDT', '').toLowerCase();
    const priceEl = document.getElementById(`price-${coin}`);
    if(priceEl) {
        const price = parseFloat(data.c).toLocaleString(undefined, {minimumFractionDigits: 2});
        priceEl.innerText = `$${price}`;
    }
};

// ── LOGIKA PARLAY ──
function togglePick(coin, dir) {
    const existingIndex = parlay.findIndex(p => p.coin === coin);
    
    if(existingIndex > -1) {
        if(parlay[existingIndex].dir === dir) {
            parlay.splice(existingIndex, 1); // Hapus jika klik tombol yang sama
        } else {
            parlay[existingIndex].dir = dir; // Ganti arah (UP -> DOWN)
        }
    } else {
        parlay.push({ coin, dir });
    }
    renderUI();
}

function renderUI() {
    const container = document.getElementById('slip-container');
    const multEl = document.getElementById('mult-val');
    const payoutEl = document.getElementById('payout-val');
    const btn = document.getElementById('place-btn');
    const countTag = document.getElementById('count-tag');

    // Update Buttons Highlight
    document.querySelectorAll('.btn-pick').forEach(b => b.classList.remove('active'));
    parlay.forEach(p => {
        const selector = `.market-card:has(.coin-name:contains('${p.coin}')) .btn-pick.${p.dir.toLowerCase()}`;
        // Manual selector fallback karena :has belum tentu support di semua browser
        const cards = document.querySelectorAll('.market-card');
        cards.forEach(card => {
            if(card.querySelector('.coin-name').innerText.includes(p.coin)) {
                card.querySelector(`.btn-pick.${p.dir.toLowerCase()}`).classList.add('active');
            }
        });
    });

    // Render Slip
    if(parlay.length === 0) {
        container.innerHTML = `<p style="color:var(--muted); font-size:0.8rem; text-align:center; padding:20px 0;">Select a direction to start</p>`;
        multEl.innerText = "1.00x";
        payoutEl.innerText = "0 Points";
        btn.disabled = true;
        countTag.innerText = "0 Picks";
    } else {
        container.innerHTML = parlay.map(p => `
            <div class="slip-item">
                <strong>${p.coin}</strong>
                <span style="color:${p.dir === 'UP' ? 'var(--accent)' : 'var(--red)'}; font-weight:bold;">${p.dir}</span>
            </div>
        `).join('');
        
        const multiplier = Math.pow(1.95, parlay.length).toFixed(2);
        multEl.innerText = `${multiplier}x`;
        payoutEl.innerText = `${Math.floor(100 * multiplier)} Points`;
        btn.disabled = false;
        countTag.innerText = `${parlay.length} Picks`;
    }
}

function connectWallet() {
    isConnected = true;
    document.getElementById('wallet-btn').innerText = "0x71...a29";
    document.getElementById('wallet-btn').style.background = "var(--accent)";
    document.getElementById('wallet-btn').style.color = "var(--bg)";
}

function submitBet() {
    if(!isConnected) return alert("Please connect wallet first!");
    alert("Parlay Submitted! Good luck with your predictions.");
    parlay = [];
    renderUI();
}

// ── ANIMASI CANVAS ──
const canvas = document.getElementById('net-canvas');
const ctx = canvas.getContext('2d');
let pts = [];

function initCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    pts = Array.from({length: 40}, () => ({
        x: Math.random()*canvas.width, y: Math.random()*canvas.height,
        vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5
    }));
}

    ctx.clearRect(0,0,canvas
