<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RIALO BET</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:15px
}

h2{
margin-top:25px
}

button{
padding:10px;
margin:3px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer
}

button.down{
background:#dc2626
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:none
}

.activeBet{
background:#020617;
border:1px solid #334155;
padding:10px;
margin-top:10px;
border-radius:8px
}

</style>
</head>

<body>

<h1>RIALO BET</h1>

<h2>Market</h2>

<div class="card">

BTC

<button onclick="addPick('BTC UP','BTC')">UP</button>
<button class="down" onclick="addPick('BTC DOWN','BTC')">DOWN</button>

</div>

<div class="card">

ETH

<button onclick="addPick('ETH UP','ETH')">UP</button>
<button class="down" onclick="addPick('ETH DOWN','ETH')">DOWN</button>

</div>

<div class="card">

SOL

<button onclick="addPick('SOL UP','SOL')">UP</button>
<button class="down" onclick="addPick('SOL DOWN','SOL')">DOWN</button>

</div>

<h2>Bet Slip</h2>

<div id="picks"></div>

<input id="amount" placeholder="Bet Amount (RIALO)" oninput="updateInfo()">

<div id="info"></div>

<button onclick="placeBet()">PLACE BET</button>

<h2>Active Bets</h2>

<div id="active"></div>

<script>

let picks=[]
let activeBets=[]

let amount=document.getElementById("amount")

function getPrice(coin){

return Math.floor(Math.random()*10000)+100

}

function addPick(text,coin){

let exist=picks.find(p=>p.coin===coin)

let price=getPrice(coin)

if(exist){

exist.text=text
exist.entry=price

}else{

picks.push({
coin:coin,
text:text,
entry:price
})

}

renderPicks()
updateInfo()

}

function renderPicks(){

let box=document.getElementById("picks")

box.innerHTML=""

picks.forEach(p=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=p.text+" ENTRY "+p.entry

box.appendChild(div)

})

}

function updateInfo(){

let info=document.getElementById("info")

let count=picks.length
let amt=Number(amount.value)||0

if(amt==0){

info.innerHTML=
"Picks : "+count

}else{

let profit=count*amt

info.innerHTML=
"Picks : "+count+
"<br>Multiplier : x"+count+
"<br>Potential Profit : "+profit+" RIALO"

}

}

function placeBet(){

let amt=Number(amount.value)

if(picks.length==0){
alert("No pick")
return
}

if(amt<=0){
alert("Enter amount")
return
}

let bet={
id:Date.now(),
picks:[...picks],
amount:amt,
end:Date.now()+300000
}

activeBets.push(bet)

picks=[]
amount.value=""

renderPicks()
updateInfo()
renderActive()

}

function renderActive(){

let box=document.getElementById("active")

box.innerHTML=""

activeBets.forEach(b=>{

let div=document.createElement("div")

div.className="activeBet"

let html=""

b.picks.forEach(p=>{
html+=p.text+" ENTRY "+p.entry+"<br>"
})

let time=Math.max(0,Math.floor((b.end-Date.now())/1000))

div.innerHTML=
html+
"<br>Amount : "+b.amount+" RIALO"+
"<br>Timer : "+time+"s"

box.appendChild(div)

})

}

setInterval(()=>{

renderActive()

},1000)

</script>

</body>
</html>
