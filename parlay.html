<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO — Crypto Prediction Market</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#050810; --bg2:#0b1120; --card:#0f1929; --border:#1a2a42;
  --accent:#4ade80; --accent2:#7c5cfc; --red:#f87171; --green:#4ade80;
  --text:#e8eaf0; --muted:#5a7090;
  --font:'Space Grotesk',sans-serif; --font-head:'Syne',sans-serif; --font-mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100;background:rgba(5,8,16,0.92);backdrop-filter:blur(16px);}
.nav-logo{font-family:var(--font-head);font-size:1.25rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer;}
.logo-dot{width:9px;height:9px;background:var(--accent);border-radius:50%;}
.nav-tabs{display:flex;gap:0.2rem;background:rgba(255,255,255,0.05);border-radius:9px;padding:3px;}
.nav-tab{padding:0.35rem 0.85rem;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,0.45);font-size:0.78rem;font-weight:500;cursor:pointer;}
.nav-tab.active{background:rgba(255,255,255,0.1);color:#fff;}

/* PARLAY PAGE */
.page{display:none; padding:2rem 1.5rem; max-width:900px; margin:0 auto;}
.page.active{display:block;}

.parlay-container{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;}
@media(max-width:800px){.parlay-container{grid-template-columns:1fr;}}

.predict-row{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;gap:1rem;margin-bottom:0.6rem;}
.coin-info{width:100px;}
.coin-name{font-weight:700;font-size:0.9rem;display:block;}
.coin-price-sm{font-family:var(--font-mono);font-size:0.8rem;color:var(--accent);font-weight:bold;}
.coin-change-sm{font-size:0.75rem;font-weight:600;}

.predict-btns{display:flex;gap:0.5rem;margin-left:auto;}
button.up-btn, button.dn-btn{padding:0.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-weight:700;cursor:pointer;transition:0.2s;}
button.up-btn.selected{background:var(--green);color:black;border-color:var(--green);}
button.dn-btn.selected{background:var(--red);color:white;border-color:var(--red);}

/* VERSUS BAR */
.vs-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-top:2rem;}
.vs-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:10px;margin-top:10px;overflow:hidden;}
.vs-fill{height:100%;width:50%;background:linear-gradient(90deg, var(--accent), var(--accent2));transition:width 0.5s ease;}

/* BET SLIP */
.bet-slip{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem;height:fit-content;position:sticky;top:85px;}
.slip-header{display:flex;justify-content:space-between;margin-bottom:1rem;}
.slip-item{display:flex;justify-content:space-between;padding:0.6rem;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:0.5rem;font-size:0.85rem;}
.slip-badge.up{color:var(--green);}
.slip-badge.down{color:var(--red);}
.place-btn{width:100%;padding:0.8rem;background:var(--accent);color:black;border:none;border-radius:8px;font-weight:800;cursor:pointer;margin-top:1rem;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><div class="logo-dot"></div> RIALO</div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="showPage('landing')">Home</button>
    <button class="nav-tab active" onclick="showPage('parlay')">Parlay</button>
    <button class="nav-tab" onclick="showPage('market')">Market</button>
  </div>
</nav>

<div class="page active" id="page-parlay">
  <div class="parlay-container">
    <div class="parlay-left">
      <h2 style="font-family:var(--font-head); margin-bottom:1rem;">Live Parlay Market</h2>
      
      <div class="predict-row" id="row-btc">
        <div class="coin-info">
          <span class="coin-name">BITCOIN</span>
          <span class="coin-price-sm" id="price-btc">$0.00</span>
        </div>
        <span class="coin-change-sm" id="change-btc">0.00%</span>
        <div class="predict-btns">
          <button class="up-btn" onclick="pick('btc', 'UP', this)">▲ UP</button>
          <button class="dn-btn" onclick="pick('btc', 'DOWN', this)">▼ DOWN</button>
        </div>
      </div>

      <div class="predict-row" id="row-eth">
        <div class="coin-info">
          <span class="coin-name">ETHEREUM</span>
          <span class="coin-price-sm" id="price-eth">$0.00</span>
        </div>
        <span class="coin-change-sm" id="change-eth">0.00%</span>
        <div class="predict-btns">
          <button class="up-btn" onclick="pick('eth', 'UP', this)">▲ UP</button>
          <button class="dn-btn" onclick="pick('eth', 'DOWN', this)">▼ DOWN</button>
        </div>
      </div>

      <div class="predict-row" id="row-sol">
        <div class="coin-info">
          <span class="coin-name">SOLANA</span>
          <span class="coin-price-sm" id="price-sol">$0.00</span>
        </div>
        <span class="coin-change-sm" id="change-sol">0.00%</span>
        <div class="predict-btns">
          <button class="up-btn" onclick="pick('sol', 'UP', this)">▲ UP</button>
          <button class="dn-btn" onclick="pick('sol', 'DOWN', this)">▼ DOWN</button>
        </div>
      </div>

      <div class="vs-row">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:bold;">
          <span>BTC Performance</span>
          <span>ETH Performance</span>
        </div>
        <div class="vs-bar"><div class="vs-fill" id="vs-bar"></div></div>
      </div>
    </div>

    <div class="bet-slip">
      <div class="slip-header">
        <h3 style="font-family:var(--font-head); font-size:1rem;">Bet Slip</h3>
        <span class="slip-count" id="slip-count">0</span>
      </div>
      <div id="slip-items">
        <p style="color:var(--muted); font-size:0.8rem; text-align:center;">No picks selected</p>
      </div>
      <button class="place-btn">PLACE PARLAY</button>
    </div>
  </div>
</div>

<script>
    let selections = {};
    let changes = { btc: 0, eth: 0, sol: 0 };

    // 1. MESIN REALTIME (WEBSOCKET BINANCE)
    function initLiveMarket() {
        const symbols = ['btcusdt', 'ethusdt', 'solusdt'];
        const wsUrl = `wss://stream.binance.com:9443/ws/${symbols.map(s => s + '@ticker').join('/')}`;
        const ws = new WebSocket(wsUrl);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const coin = data.s.replace('USDT', '').toLowerCase();
            const price = parseFloat(data.c).toLocaleString(undefined, { minimumFractionDigits: 2 });
            const change = parseFloat(data.P);

            changes[coin] = change;

            // Update ke HTML secara langsung
            const pEl = document.getElementById(`price-${coin}`);
            const cEl = document.getElementById(`change-${coin}`);

            if (pEl) pEl.innerText = `$${price}`;
            if (cEl) {
                const isPos = change >= 0;
                cEl.innerText = `${isPos ? '+' : ''}${change.toFixed(2)}%`;
                cEl.style.color = isPos ? '#4ade80' : '#f87171';
            }

            // Update Versus Bar (BTC vs ETH)
            const vsBar = document.getElementById('vs-bar');
            if (vsBar) {
                let ratio = 50 + ((changes.btc - changes.eth) * 5);
                ratio = Math.max(10, Math.min(90, ratio));
                vsBar.style.width = ratio + '%';
            }
        };

        ws.onclose = () => setTimeout(initLiveMarket, 3000);
    }

    // 2. LOGIKA TOMBOL UP/DOWN
    window.pick = function(coin, dir, btn) {
        const parent = btn.parentElement;
        
        if (selections[coin] === dir) {
            delete selections[coin];
            btn.classList.remove('selected');
        } else {
            parent.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            selections[coin] = dir;
            btn.classList.add('selected');
        }
        updateSlip();
    };

    // 3. UPDATE TAMPILAN SLIP
    function updateSlip() {
        const slipBox = document.getElementById('slip-items');
        const countBadge = document.getElementById('slip-count');
        const keys = Object.keys(selections);

        countBadge.innerText = keys.length;

        if (keys.length === 0) {
            slipBox.innerHTML = '<p style="color:var(--muted); font-size:0.8rem; text-align:center;">No picks selected</p>';
        } else {
            slipBox.innerHTML = keys.map(k => `
                <div class="slip-item">
                    <span style="font-weight:bold;">${k.toUpperCase()}</span>
                    <span class="slip-badge ${selections[k].toLowerCase()}">${selections[k]}</span>
                </div>
            `).join('');
        }
    }

    // 4. FUNGSI NAVIGASI
    window.showPage = function(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const target = document.getElementById('page-' + pageId);
        if(target) target.classList.add('active');
        
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };

    // JALANKAN MARKET!
    initLiveMarket();
</script>

</body>
</html>
