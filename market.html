<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO · Market Alpha</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#050810;--bg2:#0b1120;--card:#0f1929;--border:#1a2a42;
  --accent:#4ade80;--accent2:#7c5cfc;--red:#f87171;--green:#4ade80;
  --amber:#facc15;--cyan:#22d3ee;
  --text:#e8eaf0;--muted:#5a7090;
  --font:'Space Grotesk',sans-serif;--font-head:'Syne',sans-serif;--font-mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
#blob-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#blob-canvas{position:absolute;width:100%;height:100%;}
.nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100;background:rgba(5,8,16,0.95);backdrop-filter:blur(16px);}
.nav-logo{font-family:var(--font-head);font-size:1.25rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none;}
.logo-dot{width:9px;height:9px;background:var(--accent);border-radius:50%;animation:logopulse 2s infinite;}
@keyframes logopulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0.5)}50%{box-shadow:0 0 0 7px rgba(74,222,128,0)}}
.nav-right{display:flex;align-items:center;gap:0.6rem;}
.nav-links{display:flex;gap:0.2rem;background:rgba(255,255,255,0.05);border-radius:9px;padding:3px;}
.nav-link{padding:0.35rem 0.85rem;border-radius:6px;background:transparent;color:rgba(255,255,255,0.45);font-family:var(--font);font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;border:none;}
.nav-link:hover{color:rgba(255,255,255,0.8);}
.nav-link.active{background:rgba(255,255,255,0.1);color:#fff;}
.page{position:relative;z-index:1;animation:fadeIn 0.25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;padding:8px 0;position:relative;z-index:1;}
.ticker-track{display:flex;gap:40px;animation:ticker 30s linear infinite;white-space:nowrap;width:max-content;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{display:flex;align-items:center;gap:8px;font-size:0.75rem;font-family:var(--font-mono);}
.ticker-name{color:var(--muted);}
.ticker-price{color:var(--text);font-weight:700;}
.ticker-change{font-size:0.7rem;}
.pos{color:var(--green);}.neg{color:var(--red);}
.market-inner{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:1;}
.market-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.market-title{font-family:var(--font-head);font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;}
.market-sub{font-size:0.75rem;color:var(--muted);margin-top:3px;}
.live-badge{font-size:0.62rem;font-family:var(--font-mono);background:rgba(74,222,128,0.1);color:var(--accent);border:1px solid rgba(74,222,128,0.3);padding:3px 10px;border-radius:20px;letter-spacing:1px;}
.last-update{font-size:0.68rem;color:var(--muted);}
.section-title{font-family:var(--font-head);font-weight:800;font-size:1rem;letter-spacing:-0.3px;margin-bottom:14px;display:flex;align-items:center;gap:10px;color:var(--text);}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.mkt-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:32px;}
.mkt-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.mkt-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,92,252,0.04),transparent);opacity:0;transition:opacity 0.2s;}
.mkt-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,92,252,0.15);}
.mkt-card:hover::before{opacity:1;}
.mkt-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
.mkt-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mkt-coin-info{display:flex;align-items:center;gap:9px;}
.mkt-coin-icon{width:32px;height:32px;border-radius:50%;}
.mkt-coin-sym{font-family:var(--font-head);font-size:0.9rem;font-weight:700;}
.mkt-coin-name{font-size:0.65rem;color:var(--muted);margin-top:1px;}
.rank-badge{font-size:0.58rem;color:var(--muted);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:2px 6px;border-radius:8px;}
.mkt-card-price{font-family:var(--font-mono);font-size:1rem;font-weight:700;margin-bottom:5px;}
.mkt-card-change{display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:7px;}
.mkt-card-change.pos{background:rgba(74,222,128,0.1);color:var(--green);}
.mkt-card-change.neg{background:rgba(248,113,113,0.1);color:var(--red);}
.mkt-card-vol{font-size:0.65rem;color:var(--muted);margin-top:6px;}
.sparkline{margin-top:8px;height:36px;position:relative;}
.chart-section{display:grid;grid-template-columns:1fr 320px;gap:18px;margin-bottom:32px;}
.chart-card,.gainers-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.chart-title-text{font-family:var(--font-head);font-weight:700;font-size:0.95rem;}
.chart-price-big{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;}
.chart-change-big{font-size:0.78rem;margin-left:6px;}
.time-btns{display:flex;gap:5px;}
.time-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--font-mono);font-size:0.68rem;padding:4px 9px;border-radius:7px;cursor:pointer;transition:all 0.15s;}
.time-btn:hover,.time-btn.active{background:rgba(74,222,128,0.1);color:var(--accent);border-color:rgba(74,222,128,0.3);}
.main-chart-wrap{height:260px;}
.gainers-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.g-tab{flex:1;text-align:center;padding:7px;font-size:0.72rem;font-weight:700;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:var(--font-mono);transition:all 0.15s;}
.g-tab.active.gain{background:rgba(74,222,128,0.1);color:var(--green);}
.g-tab.active.loss{background:rgba(248,113,113,0.1);color:var(--red);}
.gainer-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(26,42,66,0.5);}
.gainer-row:last-child{border-bottom:none;}
.gainer-coin{display:flex;align-items:center;gap:9px;}
.gainer-icon{width:26px;height:26px;border-radius:50%;}
.gainer-sym{font-family:var(--font-head);font-size:0.82rem;font-weight:700;}
.gainer-name{font-size:0.62rem;color:var(--muted);}
.gainer-pct{font-family:var(--font-mono);font-size:0.8rem;font-weight:700;padding:3px 9px;border-radius:7px;}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:32px;}
.table-header-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
.search-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:0.78rem;padding:6px 12px;border-radius:9px;outline:none;width:200px;transition:border-color 0.2s;}
.search-box:focus{border-color:var(--accent2);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:0.65rem;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-weight:400;cursor:pointer;white-space:nowrap;}
th:hover{color:var(--text);}
td{padding:11px 14px;font-size:0.8rem;border-bottom:1px solid rgba(26,42,66,0.4);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(124,92,252,0.04);}
.td-coin{display:flex;align-items:center;gap:10px;}
.td-icon{width:28px;height:28px;border-radius:50%;}
.td-sym{font-family:var(--font-head);font-weight:700;font-size:0.85rem;}
.td-name{font-size:0.65rem;color:var(--muted);}
.td-price{font-family:var(--font-mono);font-weight:700;}
.pct-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:0.72rem;font-weight:700;}
.pct-pill.pos{background:rgba(74,222,128,0.1);color:var(--green);}
.pct-pill.neg{background:rgba(248,113,113,0.1);color:var(--red);}
.muted-num{color:var(--muted);font-family:var(--font-mono);font-size:0.75rem;}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,rgba(26,42,66,0.5) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-msg{color:var(--red);font-size:0.8rem;text-align:center;padding:40px;}
@media(max-width:900px){.chart-section{grid-template-columns:1fr}}
@media(max-width:700px){.col-mktcap,.col-vol{display:none;}.mkt-cards-grid{grid-template-columns:1fr 1fr;}.nav-links{display:none;}}
</style>

<script>
(function(){
  const canvas = document.getElementById('blob-canvas');
  const ctx    = canvas.getContext('2d');

  function setupCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', () => { setupCanvas(); initStreams(); });
  setupCanvas();

  const CHARS = [
    '0','1','0','1','0','1','0','1',
    'm','o','d','u','l','e',
    'e','n','t','r','y',
    'f','u','n',
    'p','u','b','l','i','c',
    's','t','r','u','c','t',
    'u','s','e',
    '{','}','(',')',':',';','<','>',
    '=','_','&','|','!',
    'a','c','q','i','r','e','s',
    'h','a','s',
  ];

  const FONT_SIZE  = 13;
  const BASE_ALPHA = 0.07;
  const GLOW_PROB  = 0.018;

  let streams = [];

  function initStreams() {
    const cols = Math.floor(canvas.width / FONT_SIZE);
    streams = Array.from({ length: cols }, (_, i) => ({
      x:     i * FONT_SIZE,
      y:     Math.random() * -canvas.height,
      speed: 0.6 + Math.random() * 1.4,
      chars: Array.from({ length: Math.floor(8 + Math.random() * 20) },
               () => CHARS[Math.floor(Math.random() * CHARS.length)]),
      glowIdx: -1,
      glowTimer: 0,
    }));
  }
  initStreams();

  function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = 'rgba(5,8,16,0.18)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = `${FONT_SIZE}px 'Space Mono', monospace`;
    ctx.textBaseline = 'top';
    streams.forEach(stream => {
      stream.y += stream.speed;
      const streamH = stream.chars.length * FONT_SIZE;
      if (stream.y - streamH > h) {
        stream.y     = -streamH - Math.random() * h * 0.5;
        stream.speed = 0.6 + Math.random() * 1.4;
        stream.chars = stream.chars.map(() =>
          CHARS[Math.floor(Math.random() * CHARS.length)]
        );
      }
      if (Math.random() < GLOW_PROB) {
        stream.glowIdx   = Math.floor(Math.random() * stream.chars.length);
        stream.glowTimer = 6 + Math.floor(Math.random() * 12);
      }
      if (stream.glowTimer > 0) stream.glowTimer--;
      else stream.glowIdx = -1;
      stream.chars.forEach((ch, ci) => {
        const cy = stream.y + ci * FONT_SIZE;
        if (cy < -FONT_SIZE || cy > h) return;
        const isGlow = (ci === stream.glowIdx && stream.glowTimer > 0);
        if (isGlow) {
          ctx.save();
          ctx.shadowColor  = '#4ade80';
          ctx.shadowBlur   = 8;
          ctx.fillStyle    = 'rgba(74,222,128,0.55)';
          ctx.fillText(ch, stream.x, cy);
          ctx.restore();
        } else {
          const headFade = ci === 0 ? 0.12 : BASE_ALPHA;
          ctx.fillStyle = `rgba(74,222,128,${headFade})`;
          ctx.fillText(ch, stream.x, cy);
        }
      });
    });
  }

  function animate() {
    draw();
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();


let allCoins=[], selectedCoinId='bitcoin', currentDays=1, mainChartInst=null, sparkCharts={};
let sortKey='rank', sortDir=1, gainTabMode='gain', refreshInterval=null;

const fmt      = (n,d=2) => n==null ? '—' : Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPrice = n => { if(n==null)return'—'; if(n>=1)return'$'+fmt(n); if(n>=0.01)return'$'+n.toFixed(4); return'$'+n.toFixed(8); };
const fmtBig   = n => { if(n==null)return'—'; if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T'; if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B'; if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M'; return'$'+fmt(n); };
const pctClass = v => v>=0 ? 'pos' : 'neg';
const pctStr   = v => v==null ? '—' : (v>=0?'+':'')+fmt(v)+'%';

async function fetchMarket(){
  const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1&sparkline=true&price_change_percentage=24h,7d');
  if(!res.ok) throw new Error('API error'); return res.json();
}
async function fetchChart(coinId, days){
  const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${days}`);
  if(!res.ok) throw new Error('Chart error'); return res.json();
}

function renderMktCards(coins){
  const top = coins.slice(0,8);
  document.getElementById('cardsGrid').innerHTML = top.map(c => {
    const chg = c.price_change_percentage_24h;
    return `<div class="mkt-card${c.id===selectedCoinId?' active':''}" onclick="selectCoin('${c.id}',this)">
      <div class="mkt-card-header"><div class="mkt-coin-info"><img class="mkt-coin-icon" src="${c.image}" loading="lazy"/><div><div class="mkt-coin-sym">${c.symbol.toUpperCase()}</div><div class="mkt-coin-name">${c.name}</div></div></div><span class="rank-badge">#${c.market_cap_rank}</span></div>
      <div class="mkt-card-price">${fmtPrice(c.current_price)}</div>
      <span class="mkt-card-change ${pctClass(chg)}">${chg>=0?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%</span>
      <div class="mkt-card-vol">Vol: ${fmtBig(c.total_volume)}</div>
      <div class="sparkline"><canvas id="spark-${c.id}" style="width:100%;height:36px"></canvas></div>
    </div>`;
  }).join('');
  top.forEach(c => {
    const spark = c.sparkline_in_7d?.price || []; if(!spark.length) return;
    const canvas = document.getElementById(`spark-${c.id}`); if(!canvas) return;
    const ctx2 = canvas.getContext('2d');
    if(sparkCharts[c.id]){ sparkCharts[c.id].destroy(); delete sparkCharts[c.id]; }
    const chg = c.price_change_percentage_24h;
    const color = chg>=0 ? '#4ade80' : '#f87171';
    sparkCharts[c.id] = new Chart(ctx2, {
      type:'line',
      data:{ labels:spark.map((_,i)=>i), datasets:[{ data:spark, borderColor:color, borderWidth:1.5, fill:true, backgroundColor:chg>=0?'rgba(74,222,128,0.15)':'rgba(248,113,113,0.15)', tension:0.4, pointRadius:0 }] },
      options:{ plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}}, animation:false, responsive:true, maintainAspectRatio:false }
    });
  });
}

async function renderMainChart(){
  const coin = allCoins.find(c => c.id===selectedCoinId); if(!coin) return;
  document.getElementById('chartTitle').textContent = `${coin.name} (${coin.symbol.toUpperCase()})`;
  document.getElementById('chartPrice').textContent = fmtPrice(coin.current_price);
  const chg = coin.price_change_percentage_24h;
  const bigEl = document.getElementById('chartChangeBig');
  bigEl.textContent = pctStr(chg); bigEl.className = 'chart-change-big '+pctClass(chg);
  try{
    const data = await fetchChart(selectedCoinId, currentDays);
    const pricesArr = data.prices;
    const labels = pricesArr.map(p => { const d=new Date(p[0]); return currentDays===1 ? d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : d.toLocaleDateString([],{month:'short',day:'numeric'}); });
    const vals = pricesArr.map(p => p[1]);
    const isUp = vals[vals.length-1] >= vals[0];
    const color = isUp ? '#4ade80' : '#f87171';
    if(mainChartInst) mainChartInst.destroy();
    const ctx3 = document.getElementById('mainChart').getContext('2d');
    mainChartInst = new Chart(ctx3, {
      type:'line',
      data:{ labels, datasets:[{ data:vals, label:coin.name, borderColor:color, borderWidth:2, backgroundColor:isUp?'rgba(74,222,128,0.15)':'rgba(248,113,113,0.15)', fill:true, tension:0.3, pointRadius:0, pointHoverRadius:5, pointHoverBackgroundColor:color }] },
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#0f1929', borderColor:'#1a2a42', borderWidth:1, titleColor:'#5a7090', bodyColor:'#e8eaf0', callbacks:{ label:c=>' '+fmtPrice(c.parsed.y) } } },
        scales:{
          x:{ grid:{color:'rgba(26,42,66,0.5)'}, ticks:{color:'#5a7090',font:{family:'Space Mono',size:10},maxTicksLimit:6} },
          y:{ position:'right', grid:{color:'rgba(26,42,66,0.5)'}, ticks:{color:'#5a7090',font:{family:'Space Mono',size:10},callback:v=>fmtPrice(v)} }
        }
      }
    });
  }catch(e){ console.error('Chart error',e); }
}

function renderGainers(){
  const sorted = [...allCoins].sort((a,b) => (b.price_change_percentage_24h||0)-(a.price_change_percentage_24h||0));
  const list   = gainTabMode==='gain' ? sorted.slice(0,7) : sorted.slice(-7).reverse();
  document.getElementById('gainTab').className = `g-tab${gainTabMode==='gain'?' active':''} gain`;
  document.getElementById('lossTab').className = `g-tab${gainTabMode==='loss'?' active':''} loss`;
  document.getElementById('gainerList').innerHTML = list.map(c => {
    const chg = c.price_change_percentage_24h;
    return `<div class="gainer-row"><div class="gainer-coin"><img class="gainer-icon" src="${c.image}" loading="lazy"/><div><div class="gainer-sym">${c.symbol.toUpperCase()}</div><div class="gainer-name">${c.name}</div></div></div><span class="gainer-pct ${pctClass(chg)}" style="background:${chg>=0?'rgba(74,222,128,0.1)':'rgba(248,113,113,0.1)'}">${pctStr(chg)}</span></div>`;
  }).join('');
}

function renderTable(coins){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? coins.filter(c=>c.name.toLowerCase().includes(q)||c.symbol.toLowerCase().includes(q)) : coins;
  document.getElementById('tableBody').innerHTML = filtered.map(c => {
    const chg24=c.price_change_percentage_24h, chg7=c.price_change_percentage_7d_in_currency;
    return `<tr onclick="selectCoin('${c.id}')" style="cursor:pointer"><td class="muted-num">${c.market_cap_rank}</td><td><div class="td-coin"><img class="td-icon" src="${c.image}" loading="lazy"/><div><div class="td-sym">${c.symbol.toUpperCase()}</div><div class="td-name">${c.name}</div></div></div></td><td class="td-price">${fmtPrice(c.current_price)}</td><td><span class="pct-pill ${pctClass(chg24)}">${pctStr(chg24)}</span></td><td><span class="pct-pill ${pctClass(chg7)}">${pctStr(chg7)}</span></td><td class="col-mktcap muted-num">${fmtBig(c.market_cap)}</td><td class="col-vol muted-num">${fmtBig(c.total_volume)}</td></tr>`;
  }).join('');
}

function renderTicker(coins){
  const items = coins.slice(0,20).map(c => { const chg=c.price_change_percentage_24h; return `<span class="ticker-item"><span class="ticker-name">${c.symbol.toUpperCase()}</span><span class="ticker-price">${fmtPrice(c.current_price)}</span><span class="ticker-change ${pctClass(chg)}">${pctStr(chg)}</span></span>`; }).join('');
  document.getElementById('tickerTrack').innerHTML = items+items;
}

function selectCoin(id, cardEl){
  selectedCoinId = id;
  document.querySelectorAll('.mkt-card').forEach(c=>c.classList.remove('active'));
  if(cardEl) cardEl.classList.add('active');
  renderMainChart();
}
function setDay(days, btn){ currentDays=days; document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderMainChart(); }
function showGainTab(tab){ gainTabMode=tab; renderGainers(); }
function sortTable(key){
  if(sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
  const km={rank:'market_cap_rank',name:'name',price:'current_price',change24h:'price_change_percentage_24h',change7d:'price_change_percentage_7d_in_currency',mktcap:'market_cap',vol:'total_volume'};
  const k=km[key];
  allCoins.sort((a,b)=>{ const av=a[k]??0,bv=b[k]??0; return typeof av==='string'?av.localeCompare(bv)*sortDir:(av-bv)*sortDir; });
  renderTable(allCoins);
}
function filterTable(){ renderTable(allCoins); }

async function loadMarketData(){
  try{
    const coins = await fetchMarket();
    allCoins = coins;
    renderTicker(coins); renderMktCards(coins); renderGainers(); renderTable(coins);
    if(!mainChartInst) renderMainChart();
    document.getElementById('lastUpdate').textContent = 'Updated '+new Date().toLocaleTimeString();
    if(!refreshInterval) refreshInterval = setInterval(loadMarketData, 30000);
  }catch(e){
    document.getElementById('cardsGrid').innerHTML = `<div class="error-msg" style="grid-column:1/-1">⚠ CoinGecko rate limit — try again in 60s.</div>`;
  }
}

loadMarketData();
</script>
